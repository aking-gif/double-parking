<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقويم — Spine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="spine-shared.css">
<style>
  .cal-toolbar{
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .cal-nav{ display: flex; gap: 4px; align-items: center }
  .cal-nav button{
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 7px;
    color: var(--ink-2);
  }
  .cal-nav button:hover{ background: var(--surface-3); color: var(--ink) }
  .cal-nav .today{ width: auto; padding: 0 12px; font-size: 12px }
  .cal-title{ font-size: 17px; font-weight: 600; min-width: 180px }

  .cal-views{ display: flex; gap: 0; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 3px }
  .cal-views button{
    padding: 6px 14px; font-size: 12.5px; color: var(--ink-3); border-radius: 6px;
  }
  .cal-views button.active{ background: var(--accent); color: #0a0b0d; font-weight: 600 }

  .cal-providers{ display: flex; gap: 8px; margin-inline-start: auto; align-items: center; flex-wrap: wrap }
  .prov-chip{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px;
    font-size: 12px; color: var(--ink-2);
    transition: all .15s;
    cursor: pointer;
  }
  .prov-chip:hover{ background: var(--surface-3) }
  .prov-chip.connected{
    background: rgba(79,180,119,0.1);
    border-color: rgba(79,180,119,0.3);
    color: var(--green);
  }
  .prov-chip.error{
    background: rgba(224,100,100,0.1);
    border-color: rgba(224,100,100,0.3);
    color: var(--red);
  }
  .prov-chip .dot{ width: 6px; height: 6px }
  .prov-chip svg{ width: 13px; height: 13px; stroke-width: 1.5 }

  /* Month grid */
  .month-grid{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .month-grid .dow{
    padding: 10px 12px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px; color: var(--ink-3);
    font-family: var(--font-en); letter-spacing: 1px;
    text-transform: uppercase; font-weight: 600;
    text-align: center;
  }
  .month-grid .day{
    min-height: 110px;
    padding: 8px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .month-grid .day:hover{ background: var(--surface-2) }
  .month-grid .day.muted{ background: var(--bg); color: var(--ink-4) }
  .month-grid .day.today .num{
    background: var(--accent); color: #0a0b0d;
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%; font-weight: 600;
  }
  .month-grid .day .num{ font-size: 13px; color: var(--ink-2); display: inline-block; margin-bottom: 4px }
  .month-grid .day.muted .num{ color: var(--ink-4) }
  .month-grid .day .ev{
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    background: var(--accent-soft);
    color: var(--accent);
    border-inline-start: 2px solid var(--accent);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer;
  }
  .month-grid .day .ev.blue{ background: rgba(103,137,197,0.12); color: var(--blue); border-color: var(--blue) }
  .month-grid .day .ev.green{ background: rgba(79,180,119,0.12); color: var(--green); border-color: var(--green) }
  .month-grid .day .ev.orange{ background: rgba(232,163,92,0.12); color: var(--orange); border-color: var(--orange) }
  .month-grid .day .ev.red{ background: rgba(224,100,100,0.12); color: var(--red); border-color: var(--red) }
  .month-grid .day .more{ font-size: 10px; color: var(--ink-3); padding: 2px 6px }

  /* Week view */
  .week-grid{
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .week-grid .wcorner{ background: var(--bg-2); border-bottom: 1px solid var(--line) }
  .week-grid .whead{
    padding: 10px 8px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    border-inline-start: 1px solid var(--line);
    text-align: center;
    font-size: 11px;
    color: var(--ink-3);
  }
  .week-grid .whead .nm{ font-family: var(--font-en); letter-spacing: 1px; text-transform: uppercase; font-weight: 600 }
  .week-grid .whead .dt{ font-size: 16px; color: var(--ink); margin-top: 4px; font-weight: 500 }
  .week-grid .whead.today .dt{
    background: var(--accent); color: #0a0b0d;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 600;
  }
  .week-grid .hour-lbl{
    padding: 4px 6px;
    border-bottom: 1px solid var(--line);
    font-size: 10px; color: var(--ink-3);
    font-family: var(--font-en);
    text-align: end;
    height: 50px;
  }
  .week-grid .hour-cell{
    border-bottom: 1px solid var(--line);
    border-inline-start: 1px solid var(--line);
    height: 50px;
    cursor: pointer;
    transition: background .1s;
  }
  .week-grid .hour-cell:hover{ background: var(--surface-2) }

  /* Sidebar (events list for selected day) */
  .cal-layout{ display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
  @media (max-width: 1100px){ .cal-layout{ grid-template-columns: 1fr } }

  .ev-card{
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-inline-start: 3px solid var(--accent);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .ev-card:hover{ background: var(--surface-3) }
  .ev-card .tm{ font-size: 11px; color: var(--ink-3); font-family: var(--font-en) }
  .ev-card .tt{ font-weight: 500; font-size: 13.5px; margin-top: 3px }
  .ev-card .meta{ font-size: 11px; color: var(--ink-3); margin-top: 4px }
  .ev-card.blue{ border-inline-start-color: var(--blue) }
  .ev-card.green{ border-inline-start-color: var(--green) }
  .ev-card.orange{ border-inline-start-color: var(--orange) }
  .ev-card.red{ border-inline-start-color: var(--red) }

  .src-badges{ display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap }
  .src-badge{
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    background: var(--surface-3); color: var(--ink-3);
    font-family: var(--font-en); letter-spacing: 0.5px; text-transform: uppercase;
  }
</style>

<body>

<div class="shell">
  <header class="topbar">
    <div class="brand" onclick="location.href='spine.html'">
      <div class="brand-mark">A</div>
      <div class="brand-name">THE SPINE <span class="accent">/ ARSANN</span></div>
    </div>
    <div style="flex:1"></div>
    <div style="font-size:12px;color:var(--ink-3)" id="meStrip">—</div>
  </header>

  <div class="mod-head">
    <div class="mod-glyph"><svg><use href="#ic-cal"/></svg></div>
    <div class="mod-title-block">
      <div class="mod-title">التقويم</div>
      <div class="mod-sub">Calendar · Events, Meetings, Approvals & Tasks</div>
    </div>
    <div class="mod-actions">
      <button id="btnConnect" class="btn">ربط حساب</button>
      <button id="btnNew" class="btn primary">+ موعد جديد</button>
    </div>
  </div>

  <div class="mod-body">

    <div class="cal-toolbar">
      <div class="cal-nav">
        <button id="navPrev" title="السابق"><svg><use href="#ic-prev"/></svg></button>
        <button class="today" id="navToday">اليوم</button>
        <button id="navNext" title="التالي"><svg><use href="#ic-next"/></svg></button>
      </div>
      <div class="cal-title" id="calTitle">—</div>

      <div class="cal-views">
        <button data-v="month" class="active">الشهر</button>
        <button data-v="week">الأسبوع</button>
        <button data-v="day">اليوم</button>
        <button data-v="agenda">قائمة</button>
      </div>

      <div class="cal-providers" id="provBar">
        <div class="prov-chip" data-prov="google">
          <svg><use href="#ic-google"/></svg> Google
        </div>
        <div class="prov-chip" data-prov="microsoft">
          <svg><use href="#ic-microsoft"/></svg> Microsoft
        </div>
        <div class="prov-chip" data-prov="apple">
          <svg><use href="#ic-apple"/></svg> Apple
        </div>
      </div>
    </div>

    <div class="cal-layout">
      <div>
        <div id="viewHost"></div>
      </div>

      <aside>
        <div class="card">
          <div class="card-head">
            <div>
              <div class="ttl" id="sideTitle">اليوم</div>
              <div class="sub" id="sideSub">—</div>
            </div>
            <span class="pill gold mono" id="sideCount">0</span>
          </div>
          <div class="card-pad" id="sideList"></div>
        </div>

        <div class="card mt-12">
          <div class="card-head"><div><div class="ttl">روابط سريعة</div></div></div>
          <div class="card-pad" style="display:flex;flex-direction:column;gap:8px">
            <button class="btn ghost" onclick="location.href='spine.html#meetings'" style="justify-content:flex-start">→ الاجتماعات</button>
            <button class="btn ghost" onclick="location.href='spine.html#approvals'" style="justify-content:flex-start">→ الاعتمادات</button>
            <button class="btn ghost" onclick="location.href='spine.html#tasks'" style="justify-content:flex-start">→ المهام</button>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

<script src="spine-api.js"></script>
<script>
const A = window.SpineAPI;

// State
let CUR = new Date();         // anchor date
let VIEW = 'month';
let EVENTS = [];               // all events from KV + providers
let PROVIDERS = {              // status of each connection
  google: { connected: false, email: '', error: '' },
  microsoft: { connected: false, email: '', error: '' },
  apple: { connected: false, email: '', error: '' }
};

// ===== Boot =====
(async () => {
  const me = await A.ensureAuth();
  if (!me) return;
  document.getElementById('meStrip').textContent = me.email || '';
  await loadProviders();
  await loadEvents();
  render();
})();

async function loadProviders(){
  try {
    const r = await A.api('/api/integrations/status').catch(() => null);
    if (r && r.providers){
      Object.assign(PROVIDERS, r.providers);
    }
  } catch(e){}
  renderProviders();
}

function renderProviders(){
  document.querySelectorAll('.prov-chip').forEach(c => {
    const p = c.dataset.prov;
    const st = PROVIDERS[p] || {};
    c.classList.toggle('connected', !!st.connected);
    c.classList.toggle('error', !!st.error);
  });
}

async function loadEvents(){
  EVENTS = [];
  // 1) Local events from KV
  try {
    const r = await A.api('/api/calendar/events').catch(() => ({events: []}));
    if (r && r.events) EVENTS = EVENTS.concat(r.events.map(e => ({...e, source: e.source || 'spine'})));
  } catch(e){}

  // 2) Synthesize from approvals + tasks (mock until provider sync wired)
  try {
    // Pull tasks with due dates
    const tr = await A.api('/api/tasks').catch(() => ({tasks: []}));
    if (tr && tr.tasks){
      tr.tasks.filter(t => t.due).forEach(t => {
        EVENTS.push({
          id: 'task_' + t.id,
          title: '📋 ' + (t.title || 'مهمة'),
          start: t.due,
          end: t.due,
          allDay: true,
          color: t.status === 'done' ? 'green' : (t.priority === 'high' ? 'red' : 'orange'),
          source: 'tasks',
          ref: { type: 'task', id: t.id }
        });
      });
    }
  } catch(e){}

  // 3) If no events yet, seed with a few demo events for current week
  if (EVENTS.length === 0){
    const today = new Date();
    EVENTS = [
      { id:'demo1', title:'اجتماع الإدارة الأسبوعي', start:isoDate(today, 10, 0), end:isoDate(today, 11, 0), color:'blue', source:'spine', meta:'قاعة الإدارة' },
      { id:'demo2', title:'مراجعة الميزانية Q2', start:isoDate(addDays(today,1), 14, 0), end:isoDate(addDays(today,1), 15, 30), color:'orange', source:'spine', meta:'مع المالية' },
      { id:'demo3', title:'تدقيق امتثال — مشروع الرياض', start:isoDate(addDays(today,3), 9, 0), end:isoDate(addDays(today,3), 12, 0), color:'green', source:'spine', meta:'تدقيق ميداني' },
      { id:'demo4', title:'توقيع عقد توريد المواد', start:isoDate(addDays(today,5), 11, 0), end:isoDate(addDays(today,5), 11, 30), color:'red', source:'spine', meta:'بانتظار اعتماد' }
    ];
  }
}

// ===== Helpers =====
function isoDate(d, h=0, m=0){
  const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, m);
  return dt.toISOString();
}
function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function startOfWeek(d){ const x = new Date(d); x.setDate(x.getDate() - x.getDay()); return x; }
function sameDay(a, b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

const MONTH_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DOW_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DOW_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

// ===== Navigation =====
document.getElementById('navPrev').onclick = () => { shift(-1); render(); };
document.getElementById('navNext').onclick = () => { shift(1); render(); };
document.getElementById('navToday').onclick = () => { CUR = new Date(); render(); };
document.querySelectorAll('.cal-views button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.cal-views button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    VIEW = b.dataset.v;
    render();
  };
});
function shift(n){
  if (VIEW === 'month'){ CUR.setMonth(CUR.getMonth()+n); }
  else if (VIEW === 'week'){ CUR.setDate(CUR.getDate()+n*7); }
  else if (VIEW === 'day'){ CUR.setDate(CUR.getDate()+n); }
  else if (VIEW === 'agenda'){ CUR.setDate(CUR.getDate()+n*7); }
  CUR = new Date(CUR);
}

// ===== Render =====
function render(){
  const host = document.getElementById('viewHost');
  if (VIEW === 'month'){
    document.getElementById('calTitle').textContent = MONTH_AR[CUR.getMonth()] + ' ' + CUR.getFullYear();
    host.innerHTML = renderMonth();
    host.querySelectorAll('.day').forEach(d => {
      d.onclick = () => { CUR = new Date(parseInt(d.dataset.ts,10)); VIEW='day'; document.querySelector('.cal-views [data-v="day"]').click(); };
    });
  } else if (VIEW === 'week'){
    const ws = startOfWeek(CUR);
    document.getElementById('calTitle').textContent = `أسبوع ${ws.getDate()} ${MONTH_AR[ws.getMonth()]}`;
    host.innerHTML = renderWeek();
  } else if (VIEW === 'day'){
    document.getElementById('calTitle').textContent = `${DOW_AR[CUR.getDay()]} ${CUR.getDate()} ${MONTH_AR[CUR.getMonth()]}`;
    host.innerHTML = renderDay();
  } else if (VIEW === 'agenda'){
    document.getElementById('calTitle').textContent = `قائمة الأحداث القادمة`;
    host.innerHTML = renderAgenda();
  }
  renderSidebar();

  // attach event clicks
  host.querySelectorAll('[data-eid]').forEach(el => el.onclick = (e) => {
    e.stopPropagation();
    showEvent(el.dataset.eid);
  });
}

function eventsOnDay(d){
  return EVENTS.filter(e => {
    const s = new Date(e.start);
    return sameDay(s, d);
  }).sort((a,b) => new Date(a.start) - new Date(b.start));
}

function renderMonth(){
  const start = startOfMonth(CUR);
  const end = endOfMonth(CUR);
  const startDow = start.getDay();
  let html = '';
  // Header
  DOW_SHORT.forEach(n => html += `<div class="dow">${n}</div>`);
  // Days
  // pad before
  const padStart = startOfWeek(start);
  const totalCells = Math.ceil((startDow + end.getDate()) / 7) * 7;
  const today = new Date();
  for (let i = 0; i < totalCells; i++){
    const d = addDays(padStart, i);
    const muted = d.getMonth() !== CUR.getMonth();
    const isToday = sameDay(d, today);
    const evs = eventsOnDay(d);
    const evsHtml = evs.slice(0, 3).map(e => `<div class="ev ${e.color||''}" data-eid="${e.id}">${A.esc(e.title)}</div>`).join('');
    const more = evs.length > 3 ? `<div class="more">+ ${evs.length-3} أخرى</div>` : '';
    html += `<div class="day ${muted?'muted':''} ${isToday?'today':''}" data-ts="${d.getTime()}">
      <div class="num">${d.getDate()}</div>
      ${evsHtml}${more}
    </div>`;
  }
  return `<div class="month-grid">${html}</div>`;
}

function renderWeek(){
  const ws = startOfWeek(CUR);
  const today = new Date();
  let html = '<div class="wcorner"></div>';
  for (let i = 0; i < 7; i++){
    const d = addDays(ws, i);
    const isT = sameDay(d, today);
    html += `<div class="whead ${isT?'today':''}"><div class="nm">${DOW_SHORT[i]}</div><div class="dt">${d.getDate()}</div></div>`;
  }
  for (let h = 8; h < 21; h++){
    html += `<div class="hour-lbl">${h}:00</div>`;
    for (let i = 0; i < 7; i++){
      const d = addDays(ws, i);
      const evs = EVENTS.filter(e => {
        const s = new Date(e.start);
        return sameDay(s, d) && s.getHours() === h;
      });
      const evsHtml = evs.map(e => `<div style="margin:2px;padding:3px 6px;border-radius:4px;font-size:11px;background:var(--accent-soft);color:var(--accent);border-inline-start:2px solid var(--accent);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" data-eid="${e.id}">${A.esc(e.title)}</div>`).join('');
      html += `<div class="hour-cell">${evsHtml}</div>`;
    }
  }
  return `<div class="week-grid">${html}</div>`;
}

function renderDay(){
  const evs = eventsOnDay(CUR);
  if (!evs.length){
    return `<div class="card"><div class="empty"><div class="ttl">لا توجد أحداث</div><div class="sub">${DOW_AR[CUR.getDay()]} ${CUR.getDate()} ${MONTH_AR[CUR.getMonth()]}</div></div></div>`;
  }
  return `<div class="card card-pad">${evs.map(eventCardHTML).join('')}</div>`;
}

function renderAgenda(){
  const upcoming = EVENTS
    .filter(e => new Date(e.start) >= new Date(new Date().setHours(0,0,0,0)))
    .sort((a,b) => new Date(a.start) - new Date(b.start))
    .slice(0, 30);
  if (!upcoming.length){
    return `<div class="card"><div class="empty"><div class="ttl">لا توجد أحداث قادمة</div></div></div>`;
  }
  // group by date
  const groups = {};
  upcoming.forEach(e => {
    const k = new Date(e.start).toDateString();
    if (!groups[k]) groups[k] = [];
    groups[k].push(e);
  });
  return `<div class="card card-pad">${Object.keys(groups).map(k => {
    const d = new Date(k);
    return `<div style="margin-bottom:18px">
      <div style="font-size:12px;color:var(--ink-3);font-family:var(--font-en);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:8px">${DOW_SHORT[d.getDay()]} · ${d.getDate()} ${MONTH_AR[d.getMonth()]}</div>
      ${groups[k].map(eventCardHTML).join('')}
    </div>`;
  }).join('')}</div>`;
}

function eventCardHTML(e){
  const s = new Date(e.start);
  const en = e.end ? new Date(e.end) : null;
  const tm = e.allDay ? 'طوال اليوم' : `${A.fmtTime(s)}${en ? ' — ' + A.fmtTime(en) : ''}`;
  const src = e.source ? `<span class="src-badge">${e.source}</span>` : '';
  return `<div class="ev-card ${e.color||''}" data-eid="${e.id}">
    <div class="tm">${tm}</div>
    <div class="tt">${A.esc(e.title)}</div>
    ${e.meta ? `<div class="meta">${A.esc(e.meta)}</div>` : ''}
    <div class="src-badges">${src}</div>
  </div>`;
}

function renderSidebar(){
  const evs = eventsOnDay(CUR);
  document.getElementById('sideTitle').textContent = sameDay(CUR, new Date()) ? 'اليوم' : `${DOW_AR[CUR.getDay()]}`;
  document.getElementById('sideSub').textContent = `${CUR.getDate()} ${MONTH_AR[CUR.getMonth()]} ${CUR.getFullYear()}`;
  document.getElementById('sideCount').textContent = evs.length;
  const list = document.getElementById('sideList');
  if (!evs.length){
    list.innerHTML = '<div class="empty"><div class="sub">لا توجد أحداث</div></div>';
  } else {
    list.innerHTML = evs.map(eventCardHTML).join('');
    list.querySelectorAll('[data-eid]').forEach(el => el.onclick = (e) => { e.stopPropagation(); showEvent(el.dataset.eid); });
  }
}

// ===== Event detail =====
function showEvent(id){
  const e = EVENTS.find(x => x.id === id);
  if (!e) return;
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="field"><label class="label">العنوان</label><div style="font-size:15px;font-weight:500">${A.esc(e.title)}</div></div>
    <div class="row">
      <div class="field"><label class="label">من</label><div>${A.fmtDate(e.start)} · ${A.fmtTime(e.start)}</div></div>
      <div class="field"><label class="label">إلى</label><div>${e.end ? A.fmtDate(e.end) + ' · ' + A.fmtTime(e.end) : '—'}</div></div>
    </div>
    ${e.meta ? `<div class="field"><label class="label">تفاصيل</label><div>${A.esc(e.meta)}</div></div>`: ''}
    <div class="field"><label class="label">المصدر</label><span class="src-badge">${e.source||'—'}</span></div>
  `;
  const foot = document.createElement('div');
  foot.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';
  if (e.source === 'spine'){
    const del = document.createElement('button');
    del.className = 'btn danger';
    del.textContent = 'حذف';
    del.onclick = async () => {
      if (!confirm('حذف هذا الحدث؟')) return;
      try { await A.api('/api/calendar/events/' + e.id, { method: 'DELETE' }); }
      catch(err){}
      EVENTS = EVENTS.filter(x => x.id !== e.id);
      m.close();
      A.toast('تم الحذف');
      render();
    };
    foot.appendChild(del);
  }
  const close = document.createElement('button');
  close.className = 'btn primary';
  close.textContent = 'إغلاق';
  foot.appendChild(close);
  const m = A.modal({ title: 'تفاصيل الحدث', body, footer: foot });
  close.onclick = m.close;
}

// ===== New event =====
document.getElementById('btnNew').onclick = () => {
  const today = new Date();
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="field"><label class="label">العنوان *</label><input id="ne-t" class="input" placeholder="اجتماع، موعد، تذكير..."/></div>
    <div class="row">
      <div class="field"><label class="label">من</label><input id="ne-s" class="input" type="datetime-local" value="${toLocalISO(today)}"/></div>
      <div class="field"><label class="label">إلى</label><input id="ne-e" class="input" type="datetime-local" value="${toLocalISO(new Date(today.getTime()+60*60*1000))}"/></div>
    </div>
    <div class="row">
      <div class="field"><label class="label">اللون</label>
        <select id="ne-c" class="input">
          <option value="">ذهبي (افتراضي)</option>
          <option value="blue">أزرق — اجتماع</option>
          <option value="green">أخضر — مهمة</option>
          <option value="orange">برتقالي — مراجعة</option>
          <option value="red">أحمر — عاجل</option>
        </select>
      </div>
      <div class="field"><label class="label">الموقع/الرابط</label><input id="ne-m" class="input" placeholder="قاعة الإدارة أو رابط Zoom"/></div>
    </div>
    <div class="field"><label class="label">وصف</label><textarea id="ne-d" class="input"></textarea></div>
  `;
  const foot = document.createElement('div');
  foot.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';
  foot.innerHTML = '<button class="btn ghost" id="ne-cancel">إلغاء</button><button class="btn primary" id="ne-save">إنشاء</button>';
  const m = A.modal({ title: 'موعد جديد', body, footer: foot });
  foot.querySelector('#ne-cancel').onclick = m.close;
  foot.querySelector('#ne-save').onclick = async () => {
    const t = body.querySelector('#ne-t').value.trim();
    if (!t){ A.toast('العنوان مطلوب', 'err'); return; }
    const ev = {
      id: 'ev_' + Date.now().toString(36),
      title: t,
      start: new Date(body.querySelector('#ne-s').value).toISOString(),
      end: new Date(body.querySelector('#ne-e').value).toISOString(),
      color: body.querySelector('#ne-c').value,
      meta: body.querySelector('#ne-m').value.trim(),
      desc: body.querySelector('#ne-d').value.trim(),
      source: 'spine',
      createdAt: new Date().toISOString()
    };
    try {
      await A.api('/api/calendar/events', { method: 'POST', body: ev });
    } catch(e){ /* persist locally anyway */ }
    EVENTS.push(ev);
    m.close();
    A.toast('تم إنشاء الموعد');
    render();
  };
};

function toLocalISO(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ===== Connect provider =====
document.getElementById('btnConnect').onclick = openConnectDialog;
document.querySelectorAll('.prov-chip').forEach(c => c.onclick = () => openConnectDialog(c.dataset.prov));

function openConnectDialog(focusProv){
  const body = document.createElement('div');
  body.innerHTML = `
    <p style="font-size:13px;color:var(--ink-2);margin-bottom:14px">اربط حسابك مع مزوّد التقويم لمزامنة الأحداث تلقائياً.</p>
    ${['google','microsoft','apple'].map(p => {
      const st = PROVIDERS[p] || {};
      const label = {google:'Google Calendar', microsoft:'Microsoft Outlook', apple:'Apple iCloud'}[p];
      const ico = {google:'#ic-google', microsoft:'#ic-microsoft', apple:'#ic-apple'}[p];
      return `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px">
        <div style="width:36px;height:36px;background:var(--surface-3);border-radius:8px;display:flex;align-items:center;justify-content:center"><svg style="width:18px;height:18px;color:var(--ink-2)"><use href="${ico}"/></svg></div>
        <div style="flex:1">
          <div style="font-weight:500">${label}</div>
          <div style="font-size:11px;color:var(--ink-3)">${st.connected ? '✓ متصل: ' + (st.email||'') : 'غير متصل'}</div>
        </div>
        ${st.connected
          ? `<button class="btn danger text-sm" data-disc="${p}">فصل</button>`
          : `<button class="btn primary text-sm" data-conn="${p}">ربط</button>`
        }
      </div>`;
    }).join('')}
    <div style="font-size:11px;color:var(--ink-3);margin-top:12px;line-height:1.7">
      ⚠️ <b>OAuth Setup:</b> هذه الأزرار تتطلب إعداد <code>GOOGLE_CLIENT_ID</code> و <code>MS_CLIENT_ID</code> في الـ Cloudflare Worker.
      راجع <code>SETUP.md</code> للخطوات.
    </div>
  `;
  const m = A.modal({ title: 'ربط حسابات التقويم', body });
  body.querySelectorAll('[data-conn]').forEach(b => b.onclick = () => startOAuth(b.dataset.conn));
  body.querySelectorAll('[data-disc]').forEach(b => b.onclick = () => disconnectProvider(b.dataset.disc));
  if (focusProv){
    const btn = body.querySelector(`[data-conn="${focusProv}"], [data-disc="${focusProv}"]`);
    if (btn){
      btn.style.outline = '2px solid var(--accent)';
      btn.style.outlineOffset = '2px';
    }
  }
}

function startOAuth(prov){
  const url = `${A.API_BASE}/api/oauth/${prov}/start?token=${encodeURIComponent(A.getToken())}&return_to=${encodeURIComponent(location.href)}`;
  const win = window.open(url, 'oauth_' + prov, 'width=520,height=620,resizable=yes,scrollbars=yes');
  // poll for completion
  const poll = setInterval(async () => {
    if (!win || win.closed){
      clearInterval(poll);
      await loadProviders();
      await loadEvents();
      render();
    }
  }, 800);
}

async function disconnectProvider(prov){
  if (!confirm('فصل ' + prov + '؟')) return;
  try {
    await A.api('/api/oauth/' + prov + '/disconnect', { method: 'POST' });
    PROVIDERS[prov] = { connected: false };
    A.toast('تم الفصل');
    renderProviders();
  } catch(e){
    A.toast(e.message || 'فشل الفصل', 'err');
  }
}
</script>
