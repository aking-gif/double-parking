<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الإدارات والوحدات — Spine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="spine-shared.css">
<style>
  .panel-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 1100px){ .panel-grid{ grid-template-columns: 1fr } }

  .dept-row{
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    transition: background .15s;
    cursor: grab;
  }
  .dept-row:hover{ background: var(--surface-2) }
  .dept-row.dragging{ opacity: .5 }
  .dept-row .handle{
    color: var(--ink-3);
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab;
  }
  .dept-row .handle svg{ width: 14px; height: 14px; stroke-width: 1.5 }
  .dept-icon{
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .dept-icon svg{ width: 17px; height: 17px; stroke-width: 1.6 }
  .dept-meta{ flex: 1; min-width: 0 }
  .dept-meta .nm{ font-size: 13.5px; font-weight: 500 }
  .dept-meta .sb{ font-size: 11px; color: var(--ink-3); font-family: var(--font-en); margin-top: 2px }
  .dept-actions{ display: flex; gap: 6px }
  .dept-actions button{
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    color: var(--ink-3);
  }
  .dept-actions button:hover{ background: var(--surface-3); color: var(--ink) }
  .dept-actions button svg{ width: 14px; height: 14px; stroke-width: 1.5 }

  .color-swatches{
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .swatch{
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .15s, border-color .15s;
  }
  .swatch.active{ border-color: var(--ink); transform: scale(1.1) }

  .icon-grid{
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
    max-height: 200px; overflow-y: auto;
    padding: 8px; background: var(--surface-2); border-radius: 8px;
  }
  .icon-cell{
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink-2);
    transition: all .15s;
  }
  .icon-cell:hover{ background: var(--surface-3); color: var(--ink) }
  .icon-cell.active{ background: var(--accent-soft); color: var(--accent); border-color: var(--accent) }
  .icon-cell svg{ width: 16px; height: 16px; stroke-width: 1.6 }

  .preview-tile{
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--surface-2);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    margin-top: 10px;
  }
  .preview-tile .pglyph{
    width: 42px; height: 42px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-tile .pglyph svg{ width: 19px; height: 19px; stroke-width: 1.6 }

  .group-tag{
    display: inline-block;
    padding: 2px 8px;
    background: var(--surface-3);
    border-radius: 999px;
    font-size: 10px;
    color: var(--ink-3);
    font-family: var(--font-en);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-inline-start: 8px;
  }

  .scope-toggle{
    display: flex;
    background: var(--surface-2);
    border-radius: 10px;
    padding: 4px;
    gap: 2px;
    margin-bottom: 16px;
    border: 1px solid var(--line);
  }
  .scope-toggle button{
    flex: 1;
    padding: 8px 14px;
    font-size: 12.5px;
    color: var(--ink-3);
    border-radius: 7px;
    transition: all .15s;
  }
  .scope-toggle button.active{
    background: var(--accent);
    color: #0a0b0d;
    font-weight: 600;
  }
</style>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-dept" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></symbol>
  </defs>
</svg>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <div class="brand" onclick="location.href='spine.html'">
      <div class="brand-mark">A</div>
      <div class="brand-name">THE SPINE <span class="accent">/ ARSANN</span></div>
    </div>
    <div style="flex:1"></div>
    <div style="font-size:12px;color:var(--ink-3)" id="meStrip">—</div>
  </header>

  <div class="mod-head">
    <div class="mod-glyph"><svg><use href="#ic-dept"/></svg></div>
    <div class="mod-title-block">
      <div class="mod-title">إدارة الإدارات والوحدات</div>
      <div class="mod-sub">Departments & Modules Administration · Admin Only</div>
    </div>
    <div class="mod-actions">
      <button id="btnReset" class="btn">إعادة الافتراضي</button>
      <button id="btnAdd" class="btn primary">+ جديد</button>
    </div>
  </div>

  <div class="mod-body">
    <div class="scope-toggle">
      <button class="active" data-scope="modules">وحدات Spine (14)</button>
      <button data-scope="depts">إدارات الشركة (7)</button>
    </div>

    <div id="emptyOrLoading" class="empty hidden">
      <div class="loader"></div>
      <div class="ttl mt-12">جارٍ التحميل…</div>
    </div>

    <div class="panel-grid" id="mainGrid">
      <!-- LEFT: list -->
      <div class="card">
        <div class="card-head">
          <div>
            <div class="ttl" id="listTitle">الوحدات</div>
            <div class="sub">اسحب لإعادة الترتيب</div>
          </div>
          <span class="pill gold mono" id="listCount">0</span>
        </div>
        <div id="deptList"></div>
      </div>

      <!-- RIGHT: editor -->
      <div class="card card-pad">
        <div id="editorEmpty" class="empty">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke-width="2"/></svg></div>
            <div class="ttl">اختر إدارة للتعديل</div>
            <div class="sub">انقر على عنصر من القائمة لتعديل خصائصه</div>
        </div>

        <div id="editor" class="hidden">
          <div class="flex items-center justify-between mb-16">
            <div class="ttl" style="font-size:15px;font-weight:600">تعديل: <span id="edName">—</span></div>
            <button id="edDelete" class="btn danger text-sm" style="padding:6px 10px">حذف</button>
          </div>

          <div class="row">
            <div class="field">
              <label class="label">الاسم بالعربي</label>
              <input id="edNameAr" class="input"/>
            </div>
            <div class="field">
              <label class="label">الاسم بالإنجليزي</label>
              <input id="edNameEn" class="input"/>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label class="label">المسؤول (Lead)</label>
              <input id="edLead" class="input" placeholder="user@arsann.com"/>
            </div>
            <div class="field">
              <label class="label">الفريق</label>
              <input id="edTeam" class="input" placeholder="فاصلة بين الإيميلات"/>
            </div>
          </div>

          <div class="field">
            <label class="label">وصف قصير</label>
            <input id="edDesc" class="input" placeholder="مثال: ٤٢٧ إجراء عبر ٧ إدارات"/>
          </div>

          <div class="field">
            <label class="label">اللون</label>
            <div class="color-swatches" id="edColors"></div>
          </div>

          <div class="field">
            <label class="label">الأيقونة</label>
            <div class="icon-grid" id="edIcons"></div>
          </div>

          <div class="field">
            <label class="label">معاينة</label>
            <div class="preview-tile">
              <div class="pglyph" id="prevGlyph"><svg id="prevSvg"></svg></div>
              <div style="flex:1">
                <div style="font-weight:500" id="prevName">—</div>
                <div style="font-size:11px;color:var(--ink-3);font-family:var(--font-en)" id="prevSub">—</div>
              </div>
              <span class="pill" id="prevGroup">module</span>
            </div>
          </div>

          <div class="flex justify-between items-center mt-16">
            <button id="edCancel" class="btn ghost">إلغاء</button>
            <button id="edSave" class="btn primary">حفظ التغييرات</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="spine-back.js" defer></script>
<script src="spine-search.js" defer></script>
<script src="spine-api.js"></script>
<script>
const A = window.SpineAPI;

// Color palette + icon library
const COLORS = ['#C9A961','#6789C5','#4FB477','#E8A35C','#E06464','#A87BC4','#5BC0BE','#D87093','#7DB9DE','#9CA3AF'];

  'cockpit':'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',

  'projects':'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  'tech':'<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
  'health':'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  'ops':'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  'legal':'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  'marketing':'<path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
  'sales':'<line x1="12" y1="2" x2="12" y2="22"/><polyline points="3 7 12 13 21 7"/>',
};

const ICON_KEYS = Object.keys(ICON_LIB);

const DEFAULT_MODULES = [
  {id:'sops', group:'core', icon:'sops', color:'#C9A961', nameAr:'الإجراءات التشغيلية', nameEn:'SOPs', desc:'٤٢٧ إجراء عبر ٧ إدارات', lead:'', team:''},
  {id:'meetings', group:'core', icon:'meet', color:'#6789C5', nameAr:'الاجتماعات', nameEn:'Meetings', desc:'١٢ اجتماع هذا الأسبوع', lead:'', team:''},
  {id:'tasks', group:'core', icon:'tasks', color:'#4FB477', nameAr:'المهام والمشاريع', nameEn:'Tasks', desc:'١٤٢ مهمة مفتوحة', lead:'', team:''},
  {id:'approvals', group:'core', icon:'approvals', color:'#E8A35C', nameAr:'الاعتمادات', nameEn:'Approvals', desc:'٣ بانتظار توقيعك', lead:'', team:''},
  {id:'decisions', group:'gov', icon:'decisions', color:'#A87BC4', nameAr:'سجل القرارات', nameEn:'Decisions Log', desc:'٢٠٤ قرار موثّق', lead:'', team:''},
  {id:'risks', group:'gov', icon:'risks', color:'#E06464', nameAr:'المخاطر', nameEn:'Risks & Issues', desc:'١٨ مخاطرة', lead:'', team:''},
  {id:'kpis', group:'gov', icon:'kpi', color:'#5BC0BE', nameAr:'لوحة المؤشرات', nameEn:'KPIs', desc:'٢٤ مؤشر تنفيذي', lead:'', team:''},
  {id:'compliance', group:'gov', icon:'compliance', color:'#C9A961', nameAr:'الامتثال والتدقيق', nameEn:'Compliance', desc:'٨٧٪ جاهزية', lead:'', team:''},
  {id:'reports', group:'gov', icon:'reports', color:'#7DB9DE', nameAr:'تقارير المجلس', nameEn:'Board Reports', desc:'تقرير الربع', lead:'', team:''},
  {id:'people', group:'res', icon:'people', color:'#6789C5', nameAr:'الفريق والصلاحيات', nameEn:'People', desc:'٤٨ موظف · ٧ إدارات', lead:'', team:''},
  {id:'vault', group:'res', icon:'vault', color:'#9CA3AF', nameAr:'مستودع الوثائق', nameEn:'Vault', desc:'١٬٢٠٤ ملف', lead:'', team:''},
  {id:'calendar', group:'res', icon:'cal', color:'#4FB477', nameAr:'التقويم', nameEn:'Calendar', desc:'٦ مراجعات دورية', lead:'', team:''},
  {id:'budget', group:'res', icon:'budget', color:'#E8A35C', nameAr:'الميزانية والإنفاق', nameEn:'Budget', desc:'٧٢٪ من ميزانية Q2', lead:'', team:''},
  {id:'vendors', group:'res', icon:'vendors', color:'#A87BC4', nameAr:'الموردون والعقود', nameEn:'Vendors', desc:'٣٤ مورد', lead:'', team:''},
  {id:'mail', group:'res', icon:'mail', color:'#D87093', nameAr:'البريد الإلكتروني', nameEn:'Mail', desc:'صندوق الوارد', lead:'', team:''},
  {id:'crm', group:'res', icon:'crm', color:'#5BC0BE', nameAr:'إدارة العلاقات', nameEn:'CRM', desc:'الشركات والصفقات', lead:'', team:''},
  {id:'hr', group:'res', icon:'hr', color:'#7DB9DE', nameAr:'الموارد البشرية', nameEn:'HR', desc:'الرواتب والحضور', lead:'', team:''},
];

const DEFAULT_DEPTS = [
  {id:'hr', icon:'hr', color:'#7DB9DE', nameAr:'الموارد البشرية', nameEn:'Human Resources', desc:'الموظفون والرواتب والتدريب', lead:'', team:''},
  {id:'finance', icon:'finance', color:'#4FB477', nameAr:'المالية', nameEn:'Finance', desc:'المحاسبة والميزانيات', lead:'', team:''},
  {id:'ops', icon:'ops', color:'#C9A961', nameAr:'العمليات', nameEn:'Operations', desc:'العمليات اليومية والإنتاج', lead:'', team:''},
  {id:'projects', icon:'projects', color:'#A87BC4', nameAr:'المشاريع', nameEn:'Projects', desc:'إدارة المشاريع والتسليم', lead:'', team:''},
  {id:'sales', icon:'sales', color:'#E8A35C', nameAr:'المبيعات', nameEn:'Sales', desc:'العملاء والصفقات', lead:'', team:''},
  {id:'tech', icon:'tech', color:'#6789C5', nameAr:'التقنية', nameEn:'Technology', desc:'الأنظمة والبنية التحتية', lead:'', team:''},
  {id:'legal', icon:'legal', color:'#9CA3AF', nameAr:'الشؤون القانونية', nameEn:'Legal', desc:'العقود والامتثال', lead:'', team:''},
];

let SCOPE = 'modules'; // 'modules' or 'depts'
let DATA = { modules: [], depts: [] };
let SELECTED = null;

// ===== Boot =====
(async () => {
  const me = await A.ensureAuth();
  if (!me) return;
  if (me.email && me.email.toLowerCase() !== 'a.king@arsann.com'){
    document.querySelector('.mod-body').innerHTML = '<div class="empty"><div class="ttl">للأدمن فقط</div><div class="sub">هذه الصفحة متاحة فقط لـ a.king@arsann.com</div></div>';
    return;
  }
  document.getElementById('meStrip').textContent = me.email || '';
  await loadAll();
  render();
})();

async function loadAll(){
  try {
    const [m, d] = await Promise.all([
      A.api('/api/kv/spine_modules_v2').catch(() => ({value: null})),
      A.api('/api/kv/spine_depts_v2').catch(() => ({value: null})),
    ]);
    DATA.modules = (m && m.value && Array.isArray(m.value)) ? m.value : DEFAULT_MODULES.slice();
    DATA.depts = (d && d.value && Array.isArray(d.value)) ? d.value : DEFAULT_DEPTS.slice();
  } catch(e){
    DATA.modules = DEFAULT_MODULES.slice();
    DATA.depts = DEFAULT_DEPTS.slice();
  }
}

async function saveAll(){
  try {
    await A.api('/api/kv/spine_modules_v2', { method:'PUT', body: { value: DATA.modules } });
    await A.api('/api/kv/spine_depts_v2',   { method:'PUT', body: { value: DATA.depts } });
    A.toast('تم الحفظ');
  } catch(e){
    A.toast('فشل الحفظ: ' + e.message, 'err');
  }
}

// ===== Scope toggle =====
document.querySelectorAll('.scope-toggle button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.scope-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    SCOPE = b.dataset.scope;
    SELECTED = null;
    render();
  };
});

// ===== Render =====
function currentList(){ return SCOPE === 'modules' ? DATA.modules : DATA.depts; }

function render(){
  const list = currentList();
  document.getElementById('listTitle').textContent = SCOPE === 'modules' ? 'وحدات Spine' : 'إدارات الشركة';
  document.getElementById('listCount').textContent = list.length;
  const wrap = document.getElementById('deptList');
  if (!list.length){
    wrap.innerHTML = '<div class="empty"><div class="ttl">لا توجد عناصر</div><div class="sub">انقر "+ جديد" للبدء</div></div>';
  } else {
    wrap.innerHTML = list.map((d, i) => rowHTML(d, i)).join('');
    wrap.querySelectorAll('.dept-row').forEach((r, i) => {
      r.onclick = (e) => {
        if (e.target.closest('.dept-actions')) return;
        SELECTED = i; renderEditor();
      };
      r.querySelector('[data-del]').onclick = (e) => { e.stopPropagation(); deleteAt(i); };
      // drag-reorder
      r.draggable = true;
      r.addEventListener('dragstart', e => { e.dataTransfer.setData('idx', i); r.classList.add('dragging'); });
      r.addEventListener('dragend',   () => r.classList.remove('dragging'));
      r.addEventListener('dragover', e => e.preventDefault());
      r.addEventListener('drop', e => {
        e.preventDefault();
        const from = parseInt(e.dataTransfer.getData('idx'), 10);
        const to = i;
        if (from === to) return;
        const arr = currentList();
        const [it] = arr.splice(from, 1);
        arr.splice(to, 0, it);
        render(); saveAll();
      });
    });
  }
  renderEditor();
}

function rowHTML(d, i){
  const iconSvg = ICON_LIB[d.icon] || ICON_LIB['ops'];
  const groupTag = SCOPE === 'modules' ? `<span class="group-tag">${d.group||'mod'}</span>` : '';
  return `
    <div class="dept-row" data-i="${i}">
      <div class="handle">${A.ICONS.drag}</div>
      <div class="dept-icon" style="background:${hex2rgba(d.color, 0.14)};color:${d.color};border:1px solid ${hex2rgba(d.color, 0.3)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${iconSvg}</svg>
      </div>
      <div class="dept-meta">
        <div class="nm">${A.esc(d.nameAr)} ${groupTag}</div>
        <div class="sb">${A.esc(d.nameEn || '')} ${d.lead ? '· ' + A.esc(d.lead) : ''}</div>
      </div>
      <div class="dept-actions">
        <button title="حذف" data-del>${A.ICONS.trash}</button>
      </div>
    </div>`;
}

function renderEditor(){
  const empty = document.getElementById('editorEmpty');
  const ed = document.getElementById('editor');
  if (SELECTED == null){ empty.classList.remove('hidden'); ed.classList.add('hidden'); return; }
  empty.classList.add('hidden'); ed.classList.remove('hidden');
  const d = currentList()[SELECTED];
  if (!d){ SELECTED = null; renderEditor(); return; }

  document.getElementById('edName').textContent = d.nameAr || d.id;
  document.getElementById('edNameAr').value = d.nameAr || '';
  document.getElementById('edNameEn').value = d.nameEn || '';
  document.getElementById('edDesc').value = d.desc || '';
  document.getElementById('edLead').value = d.lead || '';
  document.getElementById('edTeam').value = d.team || '';

  // colors
  const cw = document.getElementById('edColors');
  cw.innerHTML = COLORS.map(c => `<div class="swatch ${c===d.color?'active':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  cw.querySelectorAll('.swatch').forEach(s => s.onclick = () => {
    d.color = s.dataset.c;
    cw.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    updatePreview();
  });

  // icons
  const iw = document.getElementById('edIcons');
  iw.innerHTML = ICON_KEYS.map(k => `<div class="icon-cell ${k===d.icon?'active':''}" data-k="${k}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${ICON_LIB[k]}</svg></div>`).join('');
  iw.querySelectorAll('.icon-cell').forEach(c => c.onclick = () => {
    d.icon = c.dataset.k;
    iw.querySelectorAll('.icon-cell').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    updatePreview();
  });

  updatePreview();

  document.getElementById('edSave').onclick = saveSelected;
  document.getElementById('edCancel').onclick = () => { SELECTED = null; renderEditor(); };
  document.getElementById('edDelete').onclick = () => deleteAt(SELECTED);
}

function updatePreview(){
  if (SELECTED == null) return;
  const d = currentList()[SELECTED];
  const pg = document.getElementById('prevGlyph');
  pg.style.background = hex2rgba(d.color, 0.14);
  pg.style.color = d.color;
  pg.style.border = '1px solid ' + hex2rgba(d.color, 0.3);
  document.getElementById('prevSvg').innerHTML = ICON_LIB[d.icon] || ICON_LIB['ops'];
  document.getElementById('prevSvg').setAttribute('viewBox','0 0 24 24');
  document.getElementById('prevSvg').setAttribute('fill','none');
  document.getElementById('prevSvg').setAttribute('stroke','currentColor');
  document.getElementById('prevName').textContent = document.getElementById('edNameAr').value || d.nameAr || '—';
  document.getElementById('prevSub').textContent = document.getElementById('edDesc').value || d.desc || '—';
  document.getElementById('prevGroup').textContent = SCOPE === 'modules' ? (d.group || 'module') : 'department';
}

['edNameAr','edDesc'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

function saveSelected(){
  const d = currentList()[SELECTED];
  d.nameAr = document.getElementById('edNameAr').value.trim();
  d.nameEn = document.getElementById('edNameEn').value.trim();
  d.desc = document.getElementById('edDesc').value.trim();
  d.lead = document.getElementById('edLead').value.trim();
  d.team = document.getElementById('edTeam').value.trim();
  render();
  saveAll();
}

function deleteAt(i){
  if (!confirm('حذف "' + (currentList()[i].nameAr || currentList()[i].id) + '"؟')) return;
  currentList().splice(i, 1);
  if (SELECTED === i) SELECTED = null;
  render();
  saveAll();
}

// ===== Add new =====
document.getElementById('btnAdd').onclick = () => {
  const list = currentList();
  const newItem = {
    id: 'custom_' + Date.now().toString(36),
    group: SCOPE === 'modules' ? 'res' : undefined,
    icon: 'ops',
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    nameAr: 'وحدة جديدة',
    nameEn: 'New Module',
    desc: '',
    lead: '', team: ''
  };
  list.push(newItem);
  SELECTED = list.length - 1;
  render();
  saveAll();
};

// ===== Reset =====
document.getElementById('btnReset').onclick = () => {
  if (!confirm('إعادة الإدارات/الوحدات إلى الافتراضي؟ سيتم فقدان كل التخصيصات.')) return;
  if (SCOPE === 'modules') DATA.modules = DEFAULT_MODULES.slice();
  else DATA.depts = DEFAULT_DEPTS.slice();
  SELECTED = null;
  render();
  saveAll();
};

// ===== Helpers =====
function hex2rgba(hex, a){
  if (!hex) return 'rgba(255,255,255,0.1)';
  hex = hex.replace('#','');
  const r = parseInt(hex.substr(0,2),16);
  const g = parseInt(hex.substr(2,2),16);
  const b = parseInt(hex.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
}
