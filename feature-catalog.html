<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Catalog — 150 Ideas for Arsann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1014;
    --surface: rgba(255,255,255,.04);
    --surface-2: rgba(255,255,255,.06);
    --line: rgba(255,255,255,.10);
    --line-2: rgba(255,255,255,.18);
    --ink: #f5f5f7;
    --ink-2: #b8b9bd;
    --ink-3: #6e7077;
    --gold: #e8a547;
    --gold-soft: #f5be6b;
    --green: #9cb57a;
    --red: #d86b5c;
    --blue: #7aa8c9;
    --purple: #a584c4;
    --font-ar: 'IBM Plex Sans Arabic', sans-serif;
    --font-en: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background:
      radial-gradient(ellipse 1200px 600px at 20% 10%, rgba(232,165,71,.15), transparent 60%),
      radial-gradient(ellipse 900px 500px at 85% 90%, rgba(122,168,201,.10), transparent 60%),
      linear-gradient(135deg, #1a1612 0%, #0f1418 50%, #0a0d10 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--font-ar);
    min-height: 100vh;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle 240px at 15% 25%, rgba(232,165,71,.20), transparent),
      radial-gradient(circle 320px at 80% 75%, rgba(245,190,107,.15), transparent);
    filter: blur(60px);
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,16,20,.7);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-bottom: 1px solid var(--line);
    padding: 18px 32px;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .header h1 {
    font-family: var(--font-en);
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--gold); }
  .header-stats {
    display: flex; gap: 16px; margin-inline-start: auto;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-2);
  }
  .header-stats b { color: var(--gold); font-weight: 600; }

  /* TOOLBAR */
  .toolbar {
    max-width: 1400px; margin: 24px auto 0; padding: 0 32px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    position: relative; z-index: 1;
  }
  .filter-chip {
    padding: 8px 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line);
    backdrop-filter: blur(20px);
    border-radius: 999px;
    font-family: var(--font-en); font-size: 13px; font-weight: 500;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-chip:hover { background: rgba(255,255,255,.08); color: var(--ink); }
  .filter-chip.active {
    background: rgba(232,165,71,.95); color: #0a0b0d; border-color: rgba(232,165,71,.5);
    box-shadow: 0 4px 12px rgba(232,165,71,.25);
  }
  .search-input {
    flex: 1; min-width: 280px; max-width: 440px;
    padding: 10px 16px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line);
    backdrop-filter: blur(20px);
    border-radius: 10px;
    color: var(--ink);
    font-family: var(--font-ar);
    font-size: 14px;
    margin-inline-start: auto;
  }
  .search-input::placeholder { color: var(--ink-3); }
  .search-input:focus { outline: 0; border-color: rgba(232,165,71,.5); background: rgba(232,165,71,.06); }

  /* MAIN */
  main {
    max-width: 1400px; margin: 0 auto; padding: 24px 32px 120px;
    position: relative; z-index: 1;
  }

  /* SECTION */
  .section { margin-top: 48px; }
  .section-head {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .section-num {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--gold); letter-spacing: 0.1em;
  }
  .section-title {
    font-family: var(--font-en); font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em;
  }
  .section-count {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-3); margin-inline-start: auto;
  }

  /* CARDS GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .feat {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(40px) saturate(160%);
    -webkit-backdrop-filter: blur(40px) saturate(160%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: all .2s cubic-bezier(.2,.7,.2,1);
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.06),
      0 4px 16px rgba(0,0,0,.15);
  }
  .feat:hover {
    transform: translateY(-2px);
    border-color: var(--line-2);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      0 8px 24px rgba(0,0,0,.25);
  }
  .feat.selected {
    border-color: rgba(232,165,71,.6);
    background: rgba(232,165,71,.06);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      0 0 0 1px rgba(232,165,71,.3),
      0 8px 24px rgba(232,165,71,.15);
  }
  .feat-head {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
  }
  .feat-id {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-3); letter-spacing: 0.1em;
    background: rgba(255,255,255,.04);
    padding: 2px 6px; border-radius: 4px;
    border: 1px solid var(--line);
  }
  .feat-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--line-2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-inline-start: auto;
    transition: all .2s;
    flex-shrink: 0;
  }
  .feat.selected .feat-check {
    background: var(--gold); border-color: var(--gold);
  }
  .feat.selected .feat-check::after {
    content: "✓"; color: #0a0b0d; font-weight: 700; font-size: 13px;
  }
  .feat-title {
    font-size: 15px; font-weight: 600;
    color: var(--ink); margin-bottom: 6px;
    line-height: 1.4;
  }
  .feat-desc {
    font-size: 13px; color: var(--ink-2);
    line-height: 1.55; margin-bottom: 12px;
  }
  .feat-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .meta-tag {
    font-family: var(--font-mono); font-size: 10px;
    padding: 3px 7px; border-radius: 4px;
    letter-spacing: 0.05em;
    border: 1px solid;
  }
  .meta-tag.priority-high { background: rgba(216,107,92,.12); color: #f0a094; border-color: rgba(216,107,92,.3); }
  .meta-tag.priority-med { background: rgba(232,165,71,.12); color: var(--gold-soft); border-color: rgba(232,165,71,.3); }
  .meta-tag.priority-low { background: rgba(122,168,201,.12); color: #a8c8e0; border-color: rgba(122,168,201,.3); }
  .meta-tag.effort {
    background: rgba(255,255,255,.04); color: var(--ink-2); border-color: var(--line);
  }
  .meta-tag.cat {
    background: rgba(165,132,196,.12); color: #c8b0d8; border-color: rgba(165,132,196,.3);
  }

  /* FLOATING SUMMARY BAR */
  .summary {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,24,.85);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--line-2);
    border-radius: 16px;
    padding: 14px 20px;
    display: flex; gap: 16px; align-items: center;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      0 16px 48px rgba(0,0,0,.5);
    z-index: 200;
    min-width: 480px;
    transition: all .3s;
  }
  .summary.hidden { transform: translateX(-50%) translateY(120%); opacity: 0; }
  .summary-stat {
    display: flex; flex-direction: column; gap: 2px;
  }
  .summary-stat-num {
    font-family: var(--font-en); font-size: 22px; font-weight: 700;
    color: var(--gold);
  }
  .summary-stat-lbl {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-3); letter-spacing: 0.1em;
  }
  .summary-divider {
    width: 1px; height: 32px; background: var(--line);
  }
  .summary-actions { display: flex; gap: 8px; margin-inline-start: auto; }
  .btn {
    padding: 9px 16px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line);
    backdrop-filter: blur(20px);
    border-radius: 10px;
    color: var(--ink);
    font-family: var(--font-en); font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .btn:hover { background: rgba(255,255,255,.10); transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color: #0a0b0d;
    border-color: rgba(245,190,107,.6);
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(232,165,71,.3);
  }
  .btn.primary:hover { box-shadow: 0 6px 18px rgba(232,165,71,.5); }

  .hidden-feat { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>Feature <span>Catalog</span></h1>
    <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em;">
      150 IDEAS · 12 CATEGORIES · CHOOSE WHAT TO BUILD
    </div>
    <div class="header-stats">
      <span><b id="totalShown">150</b>&nbsp;showing</span>
      <span>·</span>
      <span><b id="totalSelected">0</b>&nbsp;selected</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <button class="filter-chip active" data-filter="all">الكل</button>

  <button class="filter-chip" data-filter="collab">Collab</button>
  <button class="filter-chip" data-filter="mobile">Mobile</button>
  <button class="filter-chip" data-filter="polish">Polish</button>
  <input type="text" class="search-input" placeholder="ابحث عن ميزة..." id="searchBox">
</div>

<main id="catalog"></main>

<div class="summary hidden" id="summary">
  <div class="summary-stat">
    <div class="summary-stat-num" id="selCount">0</div>

  </div>
  <div class="summary-actions">
    <button class="btn" id="clearBtn">مسح</button>
    <button class="btn" id="exportBtn">تصدير القائمة</button>
    <button class="btn primary" id="buildBtn">ابدأ البناء →</button>
  </div>
</div>

const SECTIONS = [
  { cat: 'integrations', num: '01', title: 'Integrations', range: '1-20' },
  { cat: 'ai', num: '02', title: 'AI Features', range: '21-40' },
  { cat: 'automations', num: '03', title: 'Automations', range: '41-55' },
  { cat: 'analytics', num: '04', title: 'Analytics & Reports', range: '56-70' },
  { cat: 'search', num: '05', title: 'Search & Discovery', range: '71-80' },
  { cat: 'workflows', num: '06', title: 'Workflows & Approvals', range: '81-95' },
  { cat: 'data', num: '07', title: 'Data Import / Export', range: '96-105' },
  { cat: 'security', num: '08', title: 'Security & Audit', range: '106-120' },
  { cat: 'notifications', num: '09', title: 'Notifications & Reminders', range: '121-130' },
  { cat: 'collab', num: '10', title: 'Collaboration', range: '131-140' },
  { cat: 'mobile', num: '11', title: 'Mobile Experience', range: '141-145' },
  { cat: 'polish', num: '12', title: 'Visual Polish', range: '146-150' },
];

const STORAGE_KEY = 'arsann_feature_selection_v1';
let selected = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeFilter = 'all';
let searchQuery = '';

function render() {
  const main = document.getElementById('catalog');
  main.innerHTML = '';
  let totalShown = 0;

  SECTIONS.forEach(sec => {
    if (activeFilter !== 'all' && activeFilter !== sec.cat) return;
    const items = FEATURES.filter(f => f.cat === sec.cat).filter(matchSearch);
    if (items.length === 0) return;
    totalShown += items.length;

    const sect = document.createElement('section');
    sect.className = 'section';
    sect.innerHTML = `
      <div class="section-head">
        <span class="section-num">${sec.num}</span>
        <h2 class="section-title">${sec.title}</h2>
        <span class="section-count">${items.length} ITEMS · ${sec.range}</span>
      </div>
      <div class="grid"></div>
    `;
    const grid = sect.querySelector('.grid');
    items.forEach(f => grid.appendChild(card(f)));
    main.appendChild(sect);
  });

  document.getElementById('totalShown').textContent = totalShown;
  document.getElementById('totalSelected').textContent = selected.size;
  updateSummary();
}

function matchSearch(f) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return f.title.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q);
}

function card(f) {
  const el = document.createElement('div');
  el.className = 'feat' + (selected.has(f.id) ? ' selected' : '');
  el.innerHTML = `
    <div class="feat-head">
      <span class="feat-id">#${String(f.id).padStart(3,'0')}</span>
      <div class="feat-check"></div>
    </div>
    <div class="feat-title">${f.title}</div>
    <div class="feat-desc">${f.desc}</div>
    <div class="feat-meta">
      <span class="meta-tag priority-${f.priority}">${f.priority === 'high' ? 'أولوية عالية' : f.priority === 'med' ? 'متوسّطة' : 'منخفضة'}</span>
      <span class="meta-tag effort">${f.effort}d · جهد</span>
      <span class="meta-tag cat">${f.cat}</span>
    </div>
  `;
  el.onclick = () => {
    if (selected.has(f.id)) selected.delete(f.id);
    else selected.add(f.id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...selected]));
    el.classList.toggle('selected');
    document.getElementById('totalSelected').textContent = selected.size;
    updateSummary();
  };
  return el;
}

function updateSummary() {
  const sel = FEATURES.filter(f => selected.has(f.id));
  const summary = document.getElementById('summary');
  if (sel.length === 0) { summary.classList.add('hidden'); return; }
  summary.classList.remove('hidden');
  document.getElementById('selCount').textContent = sel.length;
  document.getElementById('effortDays').textContent = sel.reduce((a,f) => a + f.effort, 0);
  document.getElementById('highPriority').textContent = sel.filter(f => f.priority === 'high').length;
}

// FILTERS
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  };
});

// SEARCH
document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ACTIONS
document.getElementById('clearBtn').onclick = () => {
  if (!confirm('مسح كل الاختيارات؟')) return;
  selected.clear();
  localStorage.setItem(STORAGE_KEY, '[]');
  render();
};

document.getElementById('exportBtn').onclick = () => {
  const sel = FEATURES.filter(f => selected.has(f.id));
  const txt = sel.map(f => `#${f.id} · ${f.title} · ${f.priority} · ${f.effort}d\n   ${f.desc}`).join('\n\n');
  const summary = `Arsann Feature Selection\n${'='.repeat(40)}\n\nSelected: ${sel.length} / 150\nTotal effort: ${sel.reduce((a,f)=>a+f.effort,0)} days\nHigh priority: ${sel.filter(f=>f.priority==='high').length}\n\n${'='.repeat(40)}\n\n${txt}`;
  const blob = new Blob([summary], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'arsann-feature-selection.txt'; a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('buildBtn').onclick = () => {
  const sel = FEATURES.filter(f => selected.has(f.id));
  if (sel.length === 0) return alert('اختر بعض الميزات أولاً');
  const ids = sel.map(f => `#${f.id}`).join(', ');
  alert(`اخترت ${sel.length} ميزة (${sel.reduce((a,f)=>a+f.effort,0)} يوم تقريباً).\n\nالـ IDs:\n${ids}\n\nالآن انسخ هذه الـ IDs وارجع للمحادثة لأبدأ البناء.`);
};

render();
