<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>أرسان — اختيار الإدارة</title>
<meta name="description" content="منصّة أرسان للإجراءات التشغيلية" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<!-- ⚠️ ملاحظة: تم تبسيط هذه الصفحة عمداً
     - بدون Service Worker (يُلغى أي SW قديم تلقائياً)
     - بدون welcome popup
     - بدون auth-gate filtering معقّد
     - نقرة واحدة على البطاقة → الانتقال فوراً لـ dashboard
-->

<style>
  :root{
    --bg:#F7F6F2;
    --surface:#FFFFFF;
    --surface-2:#FBFAF6;
    --ink:#111827;
    --ink-2:#374151;
    --ink-3:#6B7280;
    --line:#E7E3D8;
    --accent:#8B6F00;
    --accent-soft:#F4EFD9;
    --header-bg:#141414;
    --header-ink:#F7F6F2;
    --shadow-sm:0 1px 3px rgba(17,24,39,.05);
    --shadow-md:0 6px 20px rgba(17,24,39,.08);
    --shadow-lg:0 16px 40px rgba(17,24,39,.15);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E0F10;
    --surface:#18191B;
    --surface-2:#141517;
    --ink:#F3F1EA;
    --ink-2:#D7D3C7;
    --ink-3:#9A9487;
    --line:#262729;
    --accent:#D4B24A;
    --accent-soft:#2A2512;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:"IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:6px}

  /* ========== TOP BAR (compact) ========== */
  .topbar{
    background:var(--header-bg); color:var(--header-ink);
    padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
  }
  .topbar h1{
    margin:0; font-size:18px; font-weight:600; letter-spacing:.5px;
  }
  .topbar .sub{
    color:#A8A39A; font-size:12px; margin-top:2px;
  }
  .topbar-right{ display:flex; gap:8px; align-items:center }
  .icon-btn{
    width:36px; height:36px; border-radius:10px;
    background:rgba(255,255,255,.06);
    color:var(--header-ink); transition:.15s;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:14px;
  }
  .icon-btn:hover{ background:rgba(255,255,255,.12) }
  .icon-btn svg{ width:16px; height:16px }

  /* ========== MAIN ========== */
  main{
    max-width:1200px; margin:0 auto;
    padding:32px 24px 60px;
  }
  .page-title{
    font-size:24px; font-weight:700; margin:0 0 6px;
    color:var(--ink);
  }
  .page-sub{
    color:var(--ink-3); font-size:14px; margin:0 0 28px;
  }

  /* ========== DEPT GRID ========== */
  .dept-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .dept-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 20px;
    text-align:right;
    transition:.18s ease;
    box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:8px;
    min-height:160px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .dept-card::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(135deg, transparent 0%, rgba(139,111,0,.04) 100%);
    opacity:0; transition:.2s;
    pointer-events:none;
  }
  .dept-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-md);
    border-color:var(--accent);
  }
  .dept-card:hover::before{ opacity:1 }
  .dept-card:active{ transform:translateY(-1px) }
  .dept-icon{
    font-size:32px;
    line-height:1;
    width:48px; height:48px;
    background:var(--accent-soft);
    border-radius:12px;
    display:inline-flex; align-items:center; justify-content:center;
    color:var(--accent);
  }
  .dept-name{
    font-size:17px; font-weight:700; margin:4px 0 0;
    color:var(--ink);
  }
  .dept-desc{
    font-size:13px; color:var(--ink-3); margin:0;
    line-height:1.55;
  }
  .dept-arrow{
    position:absolute;
    bottom:16px; left:20px;
    color:var(--accent);
    opacity:0; transform:translateX(6px);
    transition:.2s;
  }
  .dept-card:hover .dept-arrow{ opacity:1; transform:translateX(0) }
  .dept-card.is-custom{
    background:linear-gradient(135deg, var(--surface) 0%, var(--accent-soft) 100%);
  }
  .dept-badge{
    position:absolute; top:10px; left:10px;
    font-size:10px; font-weight:600;
    background:rgba(139,111,0,.12);
    color:var(--accent);
    padding:3px 8px; border-radius:6px;
  }

  /* Add-dept card (admin only) */
  .add-dept-card{
    background:var(--surface-2);
    border:2px dashed var(--line);
    border-radius:var(--radius);
    padding:24px 20px;
    text-align:center;
    color:var(--ink-3);
    transition:.15s;
    min-height:160px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
  }
  .add-dept-card:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
  }
  .add-dept-card .add-icon{ font-size:28px; line-height:1 }
  .add-dept-card span{ font-weight:600; font-size:14px }

  /* User pill */
  .user-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px;
    background:rgba(255,255,255,.08);
    color:var(--header-ink);
    font-size:12px;
  }
  .user-pill .avatar{
    width:24px; height:24px; border-radius:50%;
    background:var(--accent); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:700; font-size:11px;
  }

  /* Loading state */
  .loading-msg{
    grid-column:1/-1;
    text-align:center; padding:40px;
    color:var(--ink-3); font-size:14px;
  }

  /* Modal (add dept) */
  .modal-bd{
    position:fixed; inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(4px);
    z-index:9999;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal{
    background:var(--surface); color:var(--ink);
    border-radius:14px; padding:24px;
    max-width:440px; width:100%;
    box-shadow:var(--shadow-lg);
    direction:rtl;
  }
  .modal h2{ margin:0 0 6px; font-size:18px; color:var(--accent) }
  .modal p.muted{ margin:0 0 18px; color:var(--ink-3); font-size:13px }
  .modal label{
    display:block; font-size:12px; font-weight:600;
    margin:12px 0 6px; color:var(--ink-2);
  }
  .modal input{
    width:100%; padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:inherit; font-size:14px;
    background:var(--surface); color:var(--ink);
  }
  .modal input:focus{ border-color:var(--accent); outline:none }
  .modal-err{ color:#c43; font-size:12px; min-height:16px; margin-top:8px }
  .modal-actions{
    display:flex; gap:8px; justify-content:flex-end;
    margin-top:18px;
  }
  .btn{
    padding:9px 18px; border-radius:8px;
    font-weight:600; font-size:13px;
    transition:.15s;
  }
  .btn-primary{ background:var(--accent); color:#fff }
  .btn-primary:hover{ filter:brightness(1.1) }
  .btn-ghost{ background:transparent; color:var(--ink-2); border:1px solid var(--line) }
  .btn-ghost:hover{ background:var(--surface-2) }

  @media (max-width:600px){
    .dept-grid{ grid-template-columns:1fr 1fr; gap:12px }
    .dept-card{ min-height:140px; padding:18px 14px }
    .dept-icon{ width:40px; height:40px; font-size:26px }
    main{ padding:20px 14px 40px }
    .topbar{ padding:14px 18px }
  }

  /* ============================================================
     شريط أدوات الأدمن العائم (Admin Toolbar)
     ============================================================ */
  .admin-toolbar{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--header-bg);
    color:var(--header-ink);
    border-radius:999px;
    padding:8px;
    box-shadow:0 12px 40px rgba(0,0,0,.25), 0 4px 12px rgba(0,0,0,.18);
    display:none;
    align-items:center;
    gap:4px;
    z-index:1000;
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    max-width:calc(100vw - 32px);
    overflow-x:auto;
    scrollbar-width:none;
  }
  .admin-toolbar::-webkit-scrollbar{ display:none }
  .admin-toolbar.is-visible{ display:flex }
  .admin-toolbar .at-label{
    display:inline-flex; align-items:center; gap:6px;
    padding:0 14px 0 10px;
    font-size:11px; font-weight:600;
    color:#D4B24A;
    border-right:1px solid rgba(255,255,255,.10);
    white-space:nowrap;
    height:36px;
    letter-spacing:.3px;
  }
  .admin-toolbar .at-label::before{
    content:'⭐';
    font-size:13px;
  }
  .admin-toolbar button{
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 14px;
    height:36px;
    border-radius:999px;
    background:transparent;
    color:var(--header-ink);
    font-size:13px;
    font-weight:500;
    transition:.15s;
    white-space:nowrap;
  }
  .admin-toolbar button:hover{
    background:rgba(255,255,255,.10);
  }
  .admin-toolbar button.is-primary{
    background:var(--accent);
    color:#fff;
  }
  .admin-toolbar button.is-primary:hover{
    filter:brightness(1.15);
  }
  .admin-toolbar button svg{
    width:14px; height:14px;
    flex-shrink:0;
  }
  .admin-toolbar .at-divider{
    width:1px;
    height:20px;
    background:rgba(255,255,255,.10);
    margin:0 2px;
  }

  @media (max-width:600px){
    .admin-toolbar{
      bottom:12px;
      padding:6px;
      gap:2px;
    }
    .admin-toolbar button{
      padding:7px 10px;
      font-size:12px;
    }
    .admin-toolbar button span.at-text{ display:none }
    .admin-toolbar .at-label{
      padding:0 10px 0 8px;
      font-size:10px;
    }
  }
</style>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="400" fill="#141414"/>
    <rect x="120" y="120" width="160" height="160" rx="20" fill="#8B6F00"/>
    <text x="200" y="230" font-family="sans-serif" font-size="90" font-weight="700" fill="#F7F6F2" text-anchor="middle">أ</text>
  </svg>
</template>
</head>

<body>

<!-- ========== TOP BAR ========== -->
<div class="topbar">
  <div>
    <h1>أرسان للتشغيل</h1>
    <div class="sub">منصّة الإجراءات التشغيلية القياسية</div>
  </div>
  <div class="topbar-right">
    <span id="userPill" class="user-pill" style="display:none">
      <span class="avatar" id="userAvatar">·</span>
      <span id="userEmail">—</span>
    </span>
    <button class="icon-btn" id="refreshBtn" title="تحديث الصفحة" aria-label="تحديث">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>

      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

</div>

<!-- ========== MAIN ========== -->
<main>
  <h2 class="page-title">اختر الإدارة</h2>
  <p class="page-sub">انقر على الإدارة للوصول إلى إجراءاتها التشغيلية</p>

  <div class="dept-grid" id="deptGrid">

  </div>
</main>

<!-- ========== شريط أدوات الأدمن العائم ========== -->
<div class="admin-toolbar" id="adminToolbar" role="toolbar" aria-label="أدوات الأدمن">
  <span class="at-label">أدوات الأدمن</span>

  <button class="is-primary" id="atAddDept" title="إضافة إدارة جديدة">

    <span class="at-text">إدارة جديدة</span>
  </button>

  <span class="at-divider"></span>

  <button id="atUsers" title="إدارة المستخدمين">

    <span class="at-text">المستخدمون</span>
  </button>

  <button id="atAnnounce" title="إعلان جديد">

    <span class="at-text">إعلان</span>
  </button>

  <button id="atUpdates" title="شريط التحديثات">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="at-text">التحديثات</span>
  </button>

  <button id="atActivity" title="سجل النشاط">

  <button id="atSettings" title="الإعدادات">

<script>
  /* ============================================================
     ARSAN INDEX — نسخة مبسّطة وآمنة
     ============================================================ */
  'use strict';

  window.API_BASE = "https://arsan-api.a-king-6e1.workers.dev";

  // ============================================================
  // 1. إزالة أي Service Worker قديم (هذا كان يسبب مشاكل cache)
  // ============================================================
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    }).catch(() => {});
  }
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
  }

  // ============================================================
  // 2. الإدارات الافتراضية
  // ============================================================
  const DEPARTMENTS = [
    { id: 'executive',   icon: '🏛️', name: 'الإدارة التنفيذية',     desc: 'القيادة، الاستراتيجية، والحوكمة.' },
    { id: 'projects',    icon: '🏗️', name: 'إدارة المشاريع',         desc: 'المشاريع، المتابعة، والتسليم.' },
    { id: 'finance',     icon: '💰', name: 'الإدارة المالية',         desc: 'المحاسبة، الميزانيات، والتحصيل.' },
    { id: 'procurement', icon: '🛒', name: 'إدارة المشتريات',         desc: 'المشتريات، الموردين، والعقود.' },
    { id: 'operations',  icon: '⚙️', name: 'الإدارة التشغيلية',       desc: 'العمليات اليومية والصيانة.' },
    { id: 'hr',          icon: '👥', name: 'إدارة الموارد البشرية',   desc: 'التوظيف، الأداء، والتدريب.' },
    { id: 'bizdev',      icon: '📈', name: 'إدارة تطوير الأعمال',     desc: 'الفرص التجارية والعروض.' }
  ];

  const grid = document.getElementById('deptGrid');

  // ============================================================
  // 3. الانتقال لـ dashboard — دالة موثوقة بنقرة واحدة
  // ============================================================
  function goToDept(dept) {
    try {
      localStorage.setItem('arsan_department', JSON.stringify({
        id: dept.id, name: dept.name, ts: Date.now()
      }));
    } catch(_) {}
    // طريقة موثوقة 100% — رابط مباشر مع نقر
    const url = 'dashboard.html?dept=' + encodeURIComponent(dept.id);
    window.location.href = url;
  }

  // ============================================================
  // 4. رسم بطاقة إدارة
  // ============================================================
  function renderDeptCard(dept, isCustom) {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'dept-card' + (isCustom ? ' is-custom' : '');
    card.setAttribute('data-id', dept.id);
    card.innerHTML = `
      ${isCustom ? '<span class="dept-badge">مخصّصة</span>' : ''}
      <span class="dept-icon">${dept.icon || '🏢'}</span>
      <h3 class="dept-name">${dept.name}</h3>
      <p class="dept-desc">${dept.desc || ''}</p>
      <span class="dept-arrow">←</span>
    `;
    // نقرة واحدة فقط = انتقال فوري
    card.addEventListener('click', () => goToDept(dept));
    grid.appendChild(card);
    return card;
  }

  // ============================================================
  // 5. رسم البطاقات الافتراضية
  // ============================================================
  DEPARTMENTS.forEach(d => renderDeptCard(d, false));

  // ============================================================
  // 6. تحميل الإدارات المخصّصة من Worker
  // ============================================================
  async function loadCustomDepts() {
    try {
      const token = localStorage.getItem('arsan_token') || '';
      if (!token) return;
      const res = await fetch(window.API_BASE + '/api/custom-depts', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const list = await res.json();
      if (!Array.isArray(list)) return;
      list.forEach(d => {
        if (DEPARTMENTS.find(x => x.id === d.id)) return; // skip duplicates
        renderDeptCard({
          id: d.id, name: d.name, icon: d.icon || '🏢', desc: d.desc || ''
        }, true);
      });
      maybeShowAddBtn(); // re-add the "+" card at end
    } catch(_) {}
  }

  // ============================================================
  // 7. زر "إضافة إدارة" للأدمن فقط
  // ============================================================
  function isAdmin() {
    // افحص كل المصادر الممكنة
    const sources = [
      window.ArsanCurrentUser,
      (() => { try { return JSON.parse(localStorage.getItem('arsan_me') || 'null'); } catch(_) { return null; } })(),
      (() => { try { return JSON.parse(localStorage.getItem('arsan_me_v1') || 'null'); } catch(_) { return null; } })()
    ];
    for (const me of sources) {
      if (!me) continue;
      if (me.role === 'admin') return true;
      if ((me.email || '').toLowerCase() === 'a.king@arsann.com') return true;
    }
    return false;
  }

  function maybeShowAddBtn() {
    if (!isAdmin()) return;
    const existing = document.getElementById('addDeptCard');
    if (existing) existing.remove();
    const card = document.createElement('button');
    card.id = 'addDeptCard';
    card.type = 'button';
    card.className = 'add-dept-card';
    card.innerHTML = `
      <span class="add-icon">➕</span>
      <span>إضافة إدارة جديدة</span>
      <span style="font-size:11px;opacity:.7">للأدمن فقط</span>
    `;
    card.addEventListener('click', showAddDeptModal);
    grid.appendChild(card);
  }

  function showAddDeptModal() {
    const bd = document.createElement('div');
    bd.className = 'modal-bd';
    bd.innerHTML = `
      <div class="modal">
        <h2>+ إضافة إدارة جديدة</h2>
        <p class="muted">ستُضاف للمنصّة وتظهر لجميع المستخدمين فوراً.</p>
        <label>المعرّف (إنجليزي بدون مسافات) *</label>
        <input id="dId" type="text" placeholder="hr / finance / it" style="font-family:monospace;direction:ltr">
        <label>الاسم بالعربية *</label>
        <input id="dName" type="text" placeholder="إدارة الموارد البشرية">
        <label>أيقونة (Emoji اختياري)</label>
        <input id="dIcon" type="text" placeholder="🏢" style="font-size:18px">
        <label>وصف قصير (اختياري)</label>
        <input id="dDesc" type="text" placeholder="مثال: التوظيف والرواتب">
        <div class="modal-err" id="dErr"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="dCancel">إلغاء</button>
          <button class="btn btn-primary" id="dSave">حفظ ونشر</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    bd.onclick = (e) => { if (e.target === bd) bd.remove(); };
    bd.querySelector('#dCancel').onclick = () => bd.remove();
    bd.querySelector('#dSave').onclick = async () => {
      const id = bd.querySelector('#dId').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
      const name = bd.querySelector('#dName').value.trim();
      const icon = bd.querySelector('#dIcon').value.trim() || '🏢';
      const desc = bd.querySelector('#dDesc').value.trim();
      const err = bd.querySelector('#dErr');
      err.textContent = '';
      if (!id || !name) { err.textContent = 'المعرّف والاسم مطلوبان.'; return; }
      if (DEPARTMENTS.find(x => x.id === id)) { err.textContent = 'هذا المعرّف موجود بالفعل.'; return; }
      try {
        const token = localStorage.getItem('arsan_token') || '';
        const res = await fetch(window.API_BASE + '/api/custom-depts', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ id, name, icon, desc })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { err.textContent = (data && data.error) || 'فشل الحفظ'; return; }
        bd.remove();
        renderDeptCard({ id, name, icon, desc }, true);
        maybeShowAddBtn();
      } catch(e) { err.textContent = 'خطأ في الاتصال: ' + e.message; }
    };
  }

  // ============================================================
  // 8. شريط المستخدم العلوي
  // ============================================================
  function showUserPill() {
    try {
      const me = JSON.parse(localStorage.getItem('arsan_me') || 'null');
      if (!me || !me.email) return;
      const pill = document.getElementById('userPill');
      const avatar = document.getElementById('userAvatar');
      const emailSpan = document.getElementById('userEmail');
      avatar.textContent = (me.email[0] || '?').toUpperCase();
      emailSpan.textContent = me.email;
      pill.style.display = '';
    } catch(_) {}
  }

  // ============================================================
  // 9. الثيم (داكن/فاتح)
  // ============================================================
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeIcon.innerHTML = t === 'dark'
      ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>'
      : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  setTheme(localStorage.getItem('arsan_theme') || 'light');
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem('arsan_theme', next);
  });

  // ============================================================
  // 10. اللغة
  // ============================================================
  const langToggle = document.getElementById('langToggle');
  const langLabel = document.getElementById('langLabel');
  function updateLangLabel() {
    const cur = localStorage.getItem('arsan_lang') || 'ar';
    langLabel.textContent = cur === 'ar' ? 'EN' : 'عربي';
  }
  updateLangLabel();
  langToggle.addEventListener('click', () => {
    const cur = localStorage.getItem('arsan_lang') || 'ar';
    localStorage.setItem('arsan_lang', cur === 'ar' ? 'en' : 'ar');
    location.reload();
  });

  // ============================================================
  // 11. زر التحديث (مسح cache + reload)
  // ============================================================
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    const u = new URL(location.href);
    u.searchParams.set('_v', Date.now());
    location.href = u.toString();
  });

  // ============================================================
  // 12. شريط أدوات الأدمن
  // ============================================================
  function showAdminToolbar() {
    if (!isAdmin()) return;
    const tb = document.getElementById('adminToolbar');
    if (!tb) return;
    tb.classList.add('is-visible');

    // ربط الأزرار
    document.getElementById('atAddDept').onclick = showAddDeptModal;
    document.getElementById('atUsers').onclick = () => location.href = 'users.html';
    document.getElementById('atAnnounce').onclick = () => {
      localStorage.setItem('arsan_open_panel', 'announce');
      location.href = 'dashboard.html?dept=executive';
    };
    document.getElementById('atUpdates').onclick = () => {
      localStorage.setItem('arsan_open_panel', 'updates');
      location.href = 'dashboard.html?dept=executive';
    };
    document.getElementById('atActivity').onclick = () => {
      localStorage.setItem('arsan_open_panel', 'activity');
      location.href = 'dashboard.html?dept=executive';
    };
    document.getElementById('atSlack').onclick = () => {
      localStorage.setItem('arsan_open_panel', 'slack');
      location.href = 'dashboard.html?dept=executive';
    };
    document.getElementById('atMaintenance').onclick = () => {
      localStorage.setItem('arsan_open_panel', 'maintenance');
      location.href = 'dashboard.html?dept=executive';
    };
    document.getElementById('atSettings').onclick = () => {
      localStorage.setItem('arsan_open_admin', '1');
      location.href = 'dashboard.html?dept=executive';
    };
  }

  // ============================================================
  // 13. تشغيل
  // ============================================================
  showUserPill();
  loadCustomDepts();
  maybeShowAddBtn();
  showAdminToolbar();

  // أعد التحقق بعد ثانية (لو auth-gate حدّث arsan_me متأخراً بعد login)
  setTimeout(() => {
    showUserPill();
    maybeShowAddBtn();
    showAdminToolbar();
  }, 1500);

  // فحص دوري كل 800ms لمدة 10 ثوانٍ — يلتقط أي تحديث متأخر
  let _retries = 0;
  const _checkInterval = setInterval(() => {
    _retries++;
    if (isAdmin()) {
      showAdminToolbar();
      maybeShowAddBtn();
      console.log('[ARSAN] Admin toolbar shown after', _retries, 'retries');
      clearInterval(_checkInterval);
    }
    if (_retries > 12) clearInterval(_checkInterval);
  }, 800);

  // تشخيص — اطبع في console عند التحميل
  console.log('[ARSAN DEBUG] arsan_me:', localStorage.getItem('arsan_me'));
  console.log('[ARSAN DEBUG] arsan_me_v1:', localStorage.getItem('arsan_me_v1'));
  console.log('[ARSAN DEBUG] isAdmin() =', isAdmin());

  // أمر يدوي للتشخيص
  window.arsanForceShowToolbar = () => {
    document.getElementById('adminToolbar').classList.add('is-visible');
    console.log('✅ تم إظهار الشريط يدوياً');
  };

  window.addEventListener('arsan:login', () => {
    showUserPill();
    loadCustomDepts();
    maybeShowAddBtn();
    showAdminToolbar();
  });
</script>

<!-- Auth gate (login overlay) — لا يتدخل في الشبكة، فقط يحرس الوصول -->
<script src="auth-gate.js?v=8"></script>

</body>
