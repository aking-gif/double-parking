<!-- ⚠️ ملاحظة: تم تبسيط هذه الصفحة عمداً
     - بدون Service Worker (يُلغى أي SW قديم تلقائياً)
     - بدون welcome popup
     - بدون auth-gate filtering معقّد
     - نقرة واحدة على البطاقة → الانتقال فوراً لـ dashboard
-->

<style>
  :root{
    --bg:#F7F6F2;
    --surface:#FFFFFF;
    --surface-2:#FBFAF6;
    --ink:#111827;
    --ink-2:#374151;
    --ink-3:#6B7280;
    --line:#E7E3D8;
    --accent:#8B6F00;
    --accent-soft:#F4EFD9;
    --header-bg:#141414;
    --header-ink:#F7F6F2;
    --shadow-sm:0 1px 3px rgba(17,24,39,.05);
    --shadow-md:0 6px 20px rgba(17,24,39,.08);
    --shadow-lg:0 16px 40px rgba(17,24,39,.15);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0E0F10;
    --surface:#18191B;
    --surface-2:#141517;
    --ink:#F3F1EA;
    --ink-2:#D7D3C7;
    --ink-3:#9A9487;
    --line:#262729;
    --accent:#D4B24A;
    --accent-soft:#2A2512;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:"IBM Plex Sans Arabic", system-ui, -apple-system, "Segoe UI", sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:6px}

  /* ========== TOP BAR (compact) ========== */
  .topbar{
    background:var(--header-bg); color:var(--header-ink);
    padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
  }
  .topbar h1{
    margin:0; font-size:18px; font-weight:600; letter-spacing:.5px;
  }
  .topbar .sub{
    color:#A8A39A; font-size:12px; margin-top:2px;
  }
  .topbar-right{ display:flex; gap:8px; align-items:center }
  .icon-btn{
    width:36px; height:36px; border-radius:10px;
    background:rgba(255,255,255,.06);
    color:var(--header-ink); transition:.15s;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:14px;
  }
  .icon-btn:hover{ background:rgba(255,255,255,.12) }
  .icon-btn svg{ width:16px; height:16px }

  /* ========== MAIN ========== */
  main{
    max-width:1200px; margin:0 auto;
    padding:32px 24px 60px;
  }
  .page-title{
    font-size:24px; font-weight:700; margin:0 0 6px;
    color:var(--ink);
  }
  .page-sub{
    color:var(--ink-3); font-size:14px; margin:0 0 28px;
  }

  /* ========== DEPT GRID ========== */
  .dept-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }
  .dept-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 20px;
    text-align:right;
    transition:.18s ease;
    box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:8px;
    min-height:160px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .dept-card::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(135deg, transparent 0%, rgba(139,111,0,.04) 100%);
    opacity:0; transition:.2s;
    pointer-events:none;
  }
  .dept-card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-md);
    border-color:var(--accent);
  }
  .dept-card:hover::before{ opacity:1 }
  .dept-card:active{ transform:translateY(-1px) }
  .dept-icon{
    font-size:32px;
    line-height:1;
    width:48px; height:48px;
    background:var(--accent-soft);
    border-radius:12px;
    display:inline-flex; align-items:center; justify-content:center;
    color:var(--accent);
  }
  .dept-name{
    font-size:17px; font-weight:700; margin:4px 0 0;
    color:var(--ink);
  }
  .dept-desc{
    font-size:13px; color:var(--ink-3); margin:0;
    line-height:1.55;
  }
  .dept-arrow{
    position:absolute;
    bottom:16px; left:20px;
    color:var(--accent);
    opacity:0; transform:translateX(6px);
    transition:.2s;
  }
  .dept-card:hover .dept-arrow{ opacity:1; transform:translateX(0) }
  .dept-card.is-custom{
    background:linear-gradient(135deg, var(--surface) 0%, var(--accent-soft) 100%);
  }
  .dept-badge{
    position:absolute; top:10px; left:10px;
    font-size:10px; font-weight:600;
    background:rgba(139,111,0,.12);
    color:var(--accent);
    padding:3px 8px; border-radius:6px;
  }

  /* Add-dept card (admin only) */
  .add-dept-card{
    background:var(--surface-2);
    border:2px dashed var(--line);
    border-radius:var(--radius);
    padding:24px 20px;
    text-align:center;
    color:var(--ink-3);
    transition:.15s;
    min-height:160px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
  }
  .add-dept-card:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
  }
  .add-dept-card .add-icon{ font-size:28px; line-height:1 }
  .add-dept-card span{ font-weight:600; font-size:14px }

  /* User pill */
  .user-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px;
    background:rgba(255,255,255,.08);
    color:var(--header-ink);
    font-size:12px;
  }
  .user-pill .avatar{
    width:24px; height:24px; border-radius:50%;
    background:var(--accent); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:700; font-size:11px;
  }

  /* Loading state */
  .loading-msg{
    grid-column:1/-1;
    text-align:center; padding:40px;
    color:var(--ink-3); font-size:14px;
  }

  /* Modal (add dept) */
  .modal-bd{
    position:fixed; inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(4px);
    z-index:9999;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal{
    background:var(--surface); color:var(--ink);
    border-radius:14px; padding:24px;
    max-width:440px; width:100%;
    box-shadow:var(--shadow-lg);
    direction:rtl;
  }
  .modal h2{ margin:0 0 6px; font-size:18px; color:var(--accent) }
  .modal p.muted{ margin:0 0 18px; color:var(--ink-3); font-size:13px }
  .modal label{
    display:block; font-size:12px; font-weight:600;
    margin:12px 0 6px; color:var(--ink-2);
  }
  .modal input{
    width:100%; padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:inherit; font-size:14px;
    background:var(--surface); color:var(--ink);
  }
  .modal input:focus{ border-color:var(--accent); outline:none }
  .modal-err{ color:#c43; font-size:12px; min-height:16px; margin-top:8px }
  .modal-actions{
    display:flex; gap:8px; justify-content:flex-end;
    margin-top:18px;
  }
  .btn{
    padding:9px 18px; border-radius:8px;
    font-weight:600; font-size:13px;
    transition:.15s;
  }
  .btn-primary{ background:var(--accent); color:#fff }
  .btn-primary:hover{ filter:brightness(1.1) }
  .btn-ghost{ background:transparent; color:var(--ink-2); border:1px solid var(--line) }
  .btn-ghost:hover{ background:var(--surface-2) }

  @media (max-width:600px){
    .dept-grid{ grid-template-columns:1fr 1fr; gap:12px }
    .dept-card{ min-height:140px; padding:18px 14px }
    .dept-icon{ width:40px; height:40px; font-size:26px }
    main{ padding:20px 14px 40px }
    .topbar{ padding:14px 18px }
  }

  /* ============================================================
     شريط أدوات الأدمن العائم (Admin Toolbar)
     ============================================================ */
  .admin-toolbar{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--header-bg);
    color:var(--header-ink);
    border-radius:999px;
    padding:8px;
    box-shadow:0 12px 40px rgba(0,0,0,.25), 0 4px 12px rgba(0,0,0,.18);
    display:none;
    align-items:center;
    gap:4px;
    z-index:1000;
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    max-width:calc(100vw - 32px);
    overflow-x:auto;
    scrollbar-width:none;
  }
  .admin-toolbar::-webkit-scrollbar{ display:none }
  .admin-toolbar.is-visible{ display:flex }
  .admin-toolbar .at-label{
    display:inline-flex; align-items:center; gap:6px;
    padding:0 14px 0 10px;
    font-size:11px; font-weight:600;
    color:#D4B24A;
    border-right:1px solid rgba(255,255,255,.10);
    white-space:nowrap;
    height:36px;
    letter-spacing:.3px;
  }
  .admin-toolbar .at-label::before{
    content:'⭐';
    font-size:13px;
  }
  .admin-toolbar button{
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 14px;
    height:36px;
    border-radius:999px;
    background:transparent;
    color:var(--header-ink);
    font-size:13px;
    font-weight:500;
    transition:.15s;
    white-space:nowrap;
  }
  .admin-toolbar button:hover{
    background:rgba(255,255,255,.10);
  }
  .admin-toolbar button.is-primary{
    background:var(--accent);
    color:#fff;
  }
  .admin-toolbar button.is-primary:hover{
    filter:brightness(1.15);
  }
  .admin-toolbar button svg{
    width:14px; height:14px;
    flex-shrink:0;
  }
  .admin-toolbar .at-divider{
    width:1px;
    height:20px;
    background:rgba(255,255,255,.10);
    margin:0 2px;
  }

  @media (max-width:600px){
    .admin-toolbar{
      bottom:12px;
      padding:6px;
      gap:2px;
    }
    .admin-toolbar button{
      padding:7px 10px;
      font-size:12px;
    }
    .admin-toolbar button span.at-text{ display:none }
    .admin-toolbar .at-label{
      padding:0 10px 0 8px;
      font-size:10px;
    }
  }
</style>

<script>
  /* ============================================================
     ARSAN INDEX — نسخة مبسّطة وآمنة
     ============================================================ */
  'use strict';

  window.API_BASE = "https://arsan-api.a-king-6e1.workers.dev";

  // ============================================================
  // 1. إزالة أي Service Worker قديم (هذا كان يسبب مشاكل cache)
  // ============================================================
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    }).catch(() => {});
  }
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
  }

  // ============================================================
  // Helper: قراءة الـ token من كلا الاسمين (auth-gate يستخدم _v1)
  // ============================================================
  function getArsanToken() {
    return localStorage.getItem('arsan_token_v1')
        || localStorage.getItem('arsan_token')
        || '';
  }
  window.getArsanToken = getArsanToken;

  // ============================================================
  // 2. الإدارات الافتراضية
  // ============================================================
  const DEPARTMENTS = [
    { id: 'executive',   icon: '🏛️', name: 'الإدارة التنفيذية',     desc: 'القيادة، الاستراتيجية، والحوكمة.' },
    { id: 'projects',    icon: '🏗️', name: 'إدارة المشاريع',         desc: 'المشاريع، المتابعة، والتسليم.' },
    { id: 'finance',     icon: '💰', name: 'الإدارة المالية',         desc: 'المحاسبة، الميزانيات، والتحصيل.' },
    { id: 'procurement', icon: '🛒', name: 'إدارة المشتريات',         desc: 'المشتريات، الموردين، والعقود.' },
    { id: 'operations',  icon: '⚙️', name: 'الإدارة التشغيلية',       desc: 'العمليات اليومية والصيانة.' },
    { id: 'hr',          icon: '👥', name: 'إدارة الموارد البشرية',   desc: 'التوظيف، الأداء، والتدريب.' },
    { id: 'bizdev',      icon: '📈', name: 'إدارة تطوير الأعمال',     desc: 'الفرص التجارية والعروض.' }
  ];

  const grid = document.getElementById('deptGrid');

  // ============================================================
  // 3. الانتقال لـ dashboard — دالة موثوقة بنقرة واحدة
  // ============================================================
  function goToDept(dept) {
    try {
      localStorage.setItem('arsan_department', JSON.stringify({
        id: dept.id, name: dept.name, icon: dept.icon || '🏢', desc: dept.desc || '', ts: Date.now()
      }));
    } catch(_) {}
    // طريقة موثوقة 100% — رابط مباشر مع نقر
    const url = 'dashboard.html?dept=' + encodeURIComponent(dept.id);
    window.location.href = url;
  }

  // ============================================================
  // 4. رسم بطاقة إدارة
  // ============================================================
  function renderDeptCard(dept, isCustom) {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'dept-card' + (isCustom ? ' is-custom' : '');
    card.setAttribute('data-id', dept.id);
    // 🎨 تطبيق اللون المخصّص (إن وُجد)
    if (dept.color) {
      card.style.setProperty('--dept-color', dept.color);
      card.style.background = `linear-gradient(135deg, ${dept.color}22 0%, ${dept.color}0a 100%)`;
      card.style.borderColor = dept.color + '55';
    }
    card.innerHTML = `
      ${isCustom ? '<span class="dept-badge">مخصّصة</span>' : ''}
      <span class="dept-icon"${dept.color ? ` style="color:${dept.color}"` : ''}>${dept.icon || '🏢'}</span>
      <h3 class="dept-name">${dept.name}</h3>
      <p class="dept-desc">${dept.desc || ''}</p>
      <span class="dept-arrow">←</span>
    `;
    card.addEventListener('click', () => goToDept(dept));
    grid.appendChild(card);
    return card;
  }

  // ============================================================
  // 5. رسم البطاقات الافتراضية + تطبيق التعديلات
  // ============================================================
  let DEPT_OVERRIDES = {};
  function renderAll() {
    grid.innerHTML = '';
    // built-ins with overrides applied
    DEPARTMENTS.forEach(d => {
      const ov = DEPT_OVERRIDES[d.id] || {};
      renderDeptCard({ ...d, ...ov, id: d.id }, false);
    });
    // re-load customs
    loadCustomDepts();
  }
  DEPARTMENTS.forEach(d => renderDeptCard(d, false));

  // ============================================================
  // 6. تحميل الإدارات المخصّصة + التعديلات من Worker
  // ============================================================
  async function loadCustomDepts() {
    try {
      const token = getArsanToken();
      if (!token) return;
      const res = await fetch(window.API_BASE + '/api/custom-depts', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const list = await res.json();
      if (!Array.isArray(list)) return;
      // 💾 cache in localStorage so dashboard.html can read the name immediately
      try { localStorage.setItem('arsan_custom_depts_v1', JSON.stringify(list)); } catch(_) {}
      list.forEach(d => {
        if (DEPARTMENTS.find(x => x.id === d.id)) return; // skip duplicates
        renderDeptCard({
          id: d.id, name: d.name, icon: d.icon || '🏢', desc: d.desc || '', color: d.color || ''
        }, true);
      });
      maybeShowAddBtn(); // re-add the "+" card at end
    } catch(_) {}
  }

  async function loadOverrides() {
    try {
      const token = getArsanToken();
      if (!token) return;
      const res = await fetch(window.API_BASE + '/api/dept-overrides', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      DEPT_OVERRIDES = await res.json() || {};
      renderAll();
    } catch(_) {}
  }

  // refresh on changes
  window.addEventListener('arsan:depts-changed', () => {
    loadOverrides();
  });

  // ============================================================
  // 7. زر "إضافة إدارة" للأدمن فقط
  // ============================================================
  function isAdmin() {
    // افحص كل المصادر الممكنة
    const sources = [
      window.ArsanCurrentUser,
      (() => { try { return JSON.parse(localStorage.getItem('arsan_me') || 'null'); } catch(_) { return null; } })(),
      (() => { try { return JSON.parse(localStorage.getItem('arsan_me_v1') || 'null'); } catch(_) { return null; } })()
    ];
    for (const me of sources) {
      if (!me) continue;
      if (me.role === 'admin') return true;
      if ((me.email || '').toLowerCase() === 'a.king@arsann.com') return true;
    }
    return false;
  }

  function maybeShowAddBtn() {
    if (!isAdmin()) return;
    const existing = document.getElementById('addDeptCard');
    if (existing) existing.remove();
    const card = document.createElement('button');
    card.id = 'addDeptCard';
    card.type = 'button';
    card.className = 'add-dept-card';
    card.innerHTML = `
      <span class="add-icon">➕</span>
      <span>إضافة إدارة جديدة</span>
      <span style="font-size:11px;opacity:.7">للأدمن فقط</span>
    `;
    card.addEventListener('click', () => {
      // استخدم admin-toolbar إن متوفر، وإلا fallback للنسخة المحلية
      if (window.ArsanAdminToolbar && window.ArsanAdminToolbar.openManageDepts) {
        window.ArsanAdminToolbar.openManageDepts();
      } else {
        showAddDeptModal();
      }
    });
    grid.appendChild(card);
  }

  function showAddDeptModal() {
    const bd = document.createElement('div');
    bd.className = 'modal-bd';
    bd.innerHTML = `
      <div class="modal">
        <h2>+ إضافة إدارة جديدة</h2>
        <p class="muted">ستُضاف للمنصّة وتظهر لجميع المستخدمين فوراً.</p>
        <label>المعرّف (إنجليزي بدون مسافات) *</label>
        <input id="dId" type="text" placeholder="hr / finance / it" style="font-family:monospace;direction:ltr">
        <label>الاسم بالعربية *</label>
        <input id="dName" type="text" placeholder="إدارة الموارد البشرية">
        <label>أيقونة (Emoji اختياري)</label>
        <input id="dIcon" type="text" placeholder="🏢" style="font-size:18px">
        <label>وصف قصير (اختياري)</label>
        <input id="dDesc" type="text" placeholder="مثال: التوظيف والرواتب">
        <div class="modal-err" id="dErr"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="dCancel">إلغاء</button>
          <button class="btn btn-primary" id="dSave">حفظ ونشر</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    bd.onclick = (e) => { if (e.target === bd) bd.remove(); };
    bd.querySelector('#dCancel').onclick = () => bd.remove();
    bd.querySelector('#dSave').onclick = async () => {
      const id = bd.querySelector('#dId').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
      const name = bd.querySelector('#dName').value.trim();
      const icon = bd.querySelector('#dIcon').value.trim() || '🏢';
      const desc = bd.querySelector('#dDesc').value.trim();
      const err = bd.querySelector('#dErr');
      err.textContent = '';
      if (!id || !name) { err.textContent = 'المعرّف والاسم مطلوبان.'; return; }
      if (DEPARTMENTS.find(x => x.id === id)) { err.textContent = 'هذا المعرّف موجود بالفعل.'; return; }
      try {
        const token = getArsanToken();
        const res = await fetch(window.API_BASE + '/api/custom-depts', {
          method: 'POST',
          headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ id, name, icon, desc })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) { err.textContent = (data && data.error) || 'فشل الحفظ'; return; }
        bd.remove();
        renderDeptCard({ id, name, icon, desc }, true);
        maybeShowAddBtn();
      } catch(e) { err.textContent = 'خطأ في الاتصال: ' + e.message; }
    };
  }

  // ============================================================
  // 8. شريط المستخدم العلوي
  // ============================================================
  function showUserPill() {
    try {
      const me = JSON.parse(localStorage.getItem('arsan_me_v1') || localStorage.getItem('arsan_me') || 'null');
      if (!me || !me.email) return;
      const pill = document.getElementById('userPill');
      const avatar = document.getElementById('userAvatar');
      const emailSpan = document.getElementById('userEmail');
      // اسم البروفايل من cache إن وُجد
      let displayName = me.email;
      try {
        const prof = JSON.parse(localStorage.getItem('arsan_profile_v1') || 'null');
        if (prof && (prof.firstName || prof.lastName)){
          displayName = [prof.firstName, prof.lastName].filter(Boolean).join(' ');
        }
        if (prof && prof.avatar && prof.avatar.startsWith('data:')){
          avatar.innerHTML = '<img src="'+prof.avatar+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
        } else {
          avatar.textContent = (me.email[0] || '?').toUpperCase();
        }
      } catch(_){
        avatar.textContent = (me.email[0] || '?').toUpperCase();
      }
      emailSpan.textContent = displayName;
      pill.style.display = '';
    } catch(_) {}
  }

  // ============================================================
  // 9. الثيم — يفتح منتقي ثيمات أرسان (متناسق مع باقي الصفحات)
  // ============================================================
  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    if (window.ArsanThemes && window.ArsanThemes.openPicker) {
      window.ArsanThemes.openPicker();
    }
  });

  // ============================================================
  // 9b. زر تسجيل الخروج
  // ============================================================
  const logoutBtn = document.getElementById('logoutBtn');
  function showLogoutBtn(){
    try {
      const me = JSON.parse(localStorage.getItem('arsan_me_v1') || localStorage.getItem('arsan_me') || 'null');
      if (me && me.email) logoutBtn.style.display = '';
    } catch(_){}
  }
  showLogoutBtn();
  window.addEventListener('arsan:login', showLogoutBtn);
  logoutBtn.addEventListener('click', async () => {
    if (!confirm('هل تريد تسجيل الخروج؟')) return;
    try {
      if (window.ArsanAPI && window.ArsanAPI.logout) await window.ArsanAPI.logout();
    } catch(_){}
    ['arsan_token_v1','arsan_token','arsan_me_v1','arsan_me','arsan_profile_v1'].forEach(k => {
      try { localStorage.removeItem(k); } catch(_){}
    });
    location.reload();
  });

  // ============================================================
  // 10. اللغة
  // ============================================================
  const langToggle = document.getElementById('langToggle');
  const langLabel = document.getElementById('langLabel');
  function updateLangLabel() {
    const cur = localStorage.getItem('arsan_lang') || 'ar';
    langLabel.textContent = cur === 'ar' ? 'EN' : 'عربي';
  }
  updateLangLabel();
  langToggle.addEventListener('click', () => {
    const cur = localStorage.getItem('arsan_lang') || 'ar';
    localStorage.setItem('arsan_lang', cur === 'ar' ? 'en' : 'ar');
    location.reload();
  });

  // ============================================================
  // 11. زر التحديث (مسح cache + reload)
  // ============================================================
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    const u = new URL(location.href);
    u.searchParams.set('_v', Date.now());
    location.href = u.toString();
  });

  // ============================================================
  // 11.5 — Modals عامة (بنية موحّدة)
  // ============================================================
  function openModal(title, bodyHTML, opts = {}) {
    const bd = document.createElement('div');
    bd.className = 'modal-bd';
    bd.innerHTML = `
      <div class="modal" style="max-width:${opts.width || 520}px">
        <h2>${title}</h2>
        ${opts.subtitle ? `<p class="muted">${opts.subtitle}</p>` : ''}
        <div id="mdBody">${bodyHTML}</div>
        <div class="modal-err" id="mdErr"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="mdClose">إغلاق</button>
          ${opts.saveLabel ? `<button class="btn btn-primary" id="mdSave">${opts.saveLabel}</button>` : ''}
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    bd.onclick = (e) => { if (e.target === bd) bd.remove(); };
    bd.querySelector('#mdClose').onclick = () => bd.remove();
    if (opts.saveLabel && opts.onSave) {
      bd.querySelector('#mdSave').onclick = () => opts.onSave(bd);
    }
    if (opts.onMount) opts.onMount(bd);
    return bd;
  }

  async function apiCall(path, opts = {}) {
    const token = getArsanToken();
    const res = await fetch(window.API_BASE + path, {
      method: opts.method || 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    return data;
  }

  // ============================================================
  // 11.6 — إعلان جديد
  // ============================================================
  function showAnnounceModal() {
    openModal('📢 إعلان جديد', `
      <label>عنوان الإعلان *</label>
      <input id="aTitle" type="text" placeholder="مثال: اجتماع طارئ يوم الأحد">
      <label>المحتوى *</label>
      <textarea id="aBody" rows="4" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;background:var(--surface);color:var(--ink);resize:vertical" placeholder="تفاصيل الإعلان..."></textarea>
      <label>الأهمية</label>
      <select id="aPriority" style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;background:var(--surface);color:var(--ink)">
        <option value="info">عادي</option>
        <option value="warning">مهم</option>
        <option value="urgent">عاجل</option>
      </select>
    `, {
      saveLabel: 'نشر الإعلان',
      onSave: async (bd) => {
        const title = bd.querySelector('#aTitle').value.trim();
        const body = bd.querySelector('#aBody').value.trim();
        const priority = bd.querySelector('#aPriority').value;
        const err = bd.querySelector('#mdErr');
        if (!title || !body) { err.textContent = 'العنوان والمحتوى مطلوبان.'; return; }
        try {
          await apiCall('/api/announcements', {
            method: 'POST',
            body: { title, body, priority, ts: Date.now() }
          });
          bd.remove();
          alert('✅ تم نشر الإعلان');
        } catch (e) { err.textContent = 'خطأ: ' + e.message; }
      }
    });
  }

  // ============================================================
  // 11.7 — شريط التحديثات (Google Doc URL)
  // ============================================================
  function showUpdatesModal() {
    openModal('💬 شريط التحديثات', `
      <p class="muted" style="margin-bottom:10px">رابط Google Doc يُعرَض كشريط تحديثات في أعلى dashboard.</p>
      <label>رابط المستند</label>
      <input id="uUrl" type="url" placeholder="https://docs.google.com/document/d/..." style="direction:ltr">
      <p class="muted" style="font-size:11px;margin-top:8px">اتركه فارغاً لإيقاف الشريط.</p>
    `, {
      saveLabel: 'حفظ',
      onMount: async (bd) => {
        try {
          const data = await apiCall('/api/updates-url');
          bd.querySelector('#uUrl').value = data.url || '';
        } catch(_) {}
      },
      onSave: async (bd) => {
        const url = bd.querySelector('#uUrl').value.trim();
        const err = bd.querySelector('#mdErr');
        try {
          await apiCall('/api/updates-url', { method: 'POST', body: { url } });
          bd.remove();
          alert('✅ تم الحفظ');
        } catch (e) { err.textContent = 'خطأ: ' + e.message; }
      }
    });
  }

  // ============================================================
  // 11.8 — سجل النشاط
  // ============================================================
  function showActivityModal() {
    const bd = openModal('📊 سجل النشاط', '<div id="actList" style="max-height:50vh;overflow:auto;font-size:13px">جارٍ التحميل...</div>', { width: 640 });
    apiCall('/api/activity?limit=50').then(data => {
      const list = bd.querySelector('#actList');
      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = '<p class="muted">لا يوجد نشاط.</p>'; return;
      }
      list.innerHTML = data.map(a => `
        <div style="padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px">
          <div>
            <div style="font-weight:600">${a.action || '—'}</div>
            <div style="color:var(--ink-3);font-size:12px">${a.user || ''} · ${a.target || ''}</div>
          </div>
          <div style="color:var(--ink-3);font-size:11px;white-space:nowrap">${new Date(a.ts || 0).toLocaleString('ar')}</div>
        </div>
      `).join('');
    }).catch(e => {
      bd.querySelector('#actList').innerHTML = '<p class="muted">خطأ في التحميل: ' + e.message + '</p>';
    });
  }

  // ============================================================
  // 11.9 — Slack webhook
  // ============================================================
  function showSlackModal() {
    openModal('🔗 ربط Slack', `
      <p class="muted" style="margin-bottom:10px">سترسل إشعارات الإعلانات والتحديثات لـ Slack.</p>
      <label>Webhook URL</label>
      <input id="sUrl" type="url" placeholder="https://hooks.slack.com/services/..." style="direction:ltr">
      <p class="muted" style="font-size:11px;margin-top:8px">احصل عليه من Slack: Apps → Incoming Webhooks.</p>
    `, {
      saveLabel: 'حفظ + اختبار',
      onMount: async (bd) => {
        try {
          const data = await apiCall('/api/slack-webhook');
          bd.querySelector('#sUrl').value = data.url || '';
        } catch(_) {}
      },
      onSave: async (bd) => {
        const url = bd.querySelector('#sUrl').value.trim();
        const err = bd.querySelector('#mdErr');
        try {
          await apiCall('/api/slack-webhook', { method: 'POST', body: { url } });
          if (url) {
            await apiCall('/api/debug/slack-test', { method: 'POST' });
            alert('✅ تم الحفظ. تحقق من Slack — يجب أن تصلك رسالة اختبار.');
          } else {
            alert('✅ تم إزالة الربط');
          }
          bd.remove();
        } catch (e) { err.textContent = 'خطأ: ' + e.message; }
      }
    });
  }

  // ============================================================
  // 11.10 — وكيل الصيانة
  // ============================================================
  function showMaintenanceModal() {
    const bd = openModal('🔧 وكيل الصيانة', `
      <p class="muted">يفحص المنصّة ويصلح المشاكل تلقائياً.</p>
      <div id="mResult" style="margin-top:14px;padding:14px;background:var(--surface-2);border-radius:8px;font-size:13px;min-height:80px">اضغط "تشغيل الفحص" للبدء.</div>
    `, {
      saveLabel: 'تشغيل الفحص',
      onSave: async (bd) => {
        const r = bd.querySelector('#mResult');
        r.innerHTML = '⏳ جارٍ الفحص...';
        try {
          const data = await apiCall('/api/maintenance/run', { method: 'POST' });
          const checks = data.checks || [];
          r.innerHTML = checks.length
            ? checks.map(c => `<div style="padding:6px 0;display:flex;gap:8px;align-items:center"><span>${c.ok ? '✅' : '⚠️'}</span><span>${c.name}: ${c.message || ''}</span></div>`).join('')
            : '<p>تم الفحص — كل شيء سليم.</p>';
        } catch (e) { r.innerHTML = '❌ خطأ: ' + e.message; }
      }
    });
  }

  // ============================================================
  // 11.11 — الإعدادات العامة
  // ============================================================
  function showSettingsModal() {
    openModal('⚙️ إعدادات المنصّة', `
      <p class="muted">روابط سريعة:</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
        <a href="users.html" style="padding:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-decoration:none;color:var(--ink);display:flex;justify-content:space-between;align-items:center">
          <span>👥 إدارة المستخدمين والصلاحيات</span><span>←</span>
        </a>
        <button onclick="showAnnounceModal()" style="padding:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-align:right;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;font-size:14px;color:var(--ink)">
          <span>📢 نشر إعلان جديد</span><span>+</span>
        </button>
        <button onclick="showUpdatesModal()" style="padding:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-align:right;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;font-size:14px;color:var(--ink)">
          <span>💬 ربط شريط التحديثات (Google Doc)</span><span>+</span>
        </button>
        <button onclick="showSlackModal()" style="padding:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-align:right;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;font-size:14px;color:var(--ink)">
          <span>🔗 ربط Slack</span><span>+</span>
        </button>
        <button onclick="showActivityModal()" style="padding:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;text-align:right;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;font-size:14px;color:var(--ink)">
          <span>📊 عرض سجل النشاط</span><span>←</span>
        </button>
      </div>
    `, { width: 480 });
  }

  // اجعلها متاحة عالمياً (للأزرار inline في settings modal)
  window.showAnnounceModal = showAnnounceModal;
  window.showUpdatesModal = showUpdatesModal;
  window.showSlackModal = showSlackModal;
  window.showActivityModal = showActivityModal;

  // ============================================================
  // 13. تشغيل
  // ============================================================
  showUserPill();
  loadOverrides();
  maybeShowAddBtn();

  setTimeout(() => {
    showUserPill();
    maybeShowAddBtn();
  }, 1500);

  window.addEventListener('arsan:login', () => {
    showUserPill();
    loadOverrides();
    maybeShowAddBtn();
  });

  // عند إضافة/تعديل/حذف إدارة من admin-toolbar — أعد تحميل الشبكة
  window.addEventListener('arsan:depts-changed', () => {
    // امسح بطاقات الإدارات المخصّصة الحالية واعد البناء
    document.querySelectorAll('.dept-card.is-custom').forEach(c => c.remove());
    loadOverrides();
    maybeShowAddBtn();
  });
</script>

<!-- Auth gate (login overlay) — لا يتدخل في الشبكة، فقط يحرس الوصول -->
<script src="auth-gate.js?v=20"></script>
</body>
</html>
