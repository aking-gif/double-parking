<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>أرسان — الفريق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0c; --surface:#141416; --surface-2:#1c1c1f; --surface-3:#222226;
  --line:#2a2a2e; --ink:#f5f5f7; --ink-2:#c8c8cc; --ink-3:#8e8e93;
  --accent:#e7c66a; --accent-soft:rgba(231,198,106,.12); --accent-line:rgba(231,198,106,.25);
  --radius:14px;
  --font:'IBM Plex Sans Arabic', system-ui, sans-serif;
  --font-mono:'Space Grotesk', monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
input{font-family:inherit;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:14px;padding:11px 13px;transition:.15s}
input:focus{outline:none;border-color:var(--accent);background:var(--surface-3)}

.shell{max-width:1180px;margin:0 auto;padding:28px 24px 80px}
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px}
.crumbs{display:flex;align-items:center;gap:10px;color:var(--ink-3);font-size:13px}
.crumbs a:hover{color:var(--accent)}
.crumbs .sep{opacity:.5}
.crumbs strong{color:var(--ink);font-weight:600}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--ink-2);transition:.15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

.page-head{margin-bottom:28px}
.page-title{font-size:32px;font-weight:700;margin:0 0 6px;letter-spacing:-.01em}
.page-sub{color:var(--ink-3);font-size:14px;line-height:1.6}

.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.search{flex:1;min-width:240px;position:relative}
.search input{width:100%;padding-right:40px}
.search svg{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border:1px solid var(--line);border-radius:999px;font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:.15s;background:var(--surface)}
.chip:hover{border-color:var(--ink-3)}
.chip.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600}
.count{color:var(--ink-3);font-size:13px;font-family:var(--font-mono)}

.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:14px}
.person{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;transition:.18s;cursor:pointer;display:flex;gap:14px;align-items:flex-start;text-decoration:none;color:inherit}
.person:hover{border-color:var(--accent-line);background:var(--surface-2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.p-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#e7c66a,#85714D);display:grid;place-items:center;color:#1a1a1a;font-weight:700;font-size:18px;flex-shrink:0;overflow:hidden}
.p-avatar img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:600;margin:0 0 3px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-name .placeholder{color:var(--ink-3);font-style:italic;font-weight:400}
.p-job{font-size:12px;color:var(--ink-2);margin:0 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-email{font-size:11px;color:var(--ink-3);direction:ltr;text-align:right;font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.p-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;background:var(--surface-3);color:var(--ink-2);border:1px solid var(--line)}
.p-tag.role-admin{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-line)}

.empty{text-align:center;padding:60px 20px;color:var(--ink-3);font-size:14px}
.empty svg{display:block;margin:0 auto 12px;opacity:.4}

.skeleton-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;gap:14px}
.sk{background:linear-gradient(90deg,var(--surface-2),var(--surface-3),var(--surface-2));background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.sk-av{width:48px;height:48px;border-radius:50%;flex-shrink:0}
.sk-line{height:12px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="shell">
  <div class="top-bar">
    <div class="crumbs">
      <a href="index.html">الرئيسية</a>
      <span class="sep">/</span>
      <strong>الفريق</strong>
    </div>
    <a class="back-btn" href="index.html">→ رجوع</a>
  </div>

  <div class="page-head">
    <h1 class="page-title">الفريق</h1>
    <p class="page-sub">اضغط على أي زميل لعرض ملفه الشخصي والتواصل معه.</p>
  </div>

  <div class="toolbar">
    <div class="search">
      <input id="searchInput" type="search" placeholder="ابحث بالاسم، المسمّى، أو الإيميل…" autofocus>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <span class="count" id="count">…</span>
  </div>

  <div class="filter-chips" id="deptChips" style="margin-bottom:24px"></div>

  <div class="grid" id="grid">
    <!-- skeletons -->
    <div class="skeleton-card"><div class="sk sk-av"></div><div style="flex:1"><div class="sk sk-line" style="width:60%"></div><div class="sk sk-line" style="width:40%"></div><div class="sk sk-line" style="width:80%"></div></div></div>
    <div class="skeleton-card"><div class="sk sk-av"></div><div style="flex:1"><div class="sk sk-line" style="width:55%"></div><div class="sk sk-line" style="width:45%"></div><div class="sk sk-line" style="width:75%"></div></div></div>
    <div class="skeleton-card"><div class="sk sk-av"></div><div style="flex:1"><div class="sk sk-line" style="width:70%"></div><div class="sk sk-line" style="width:35%"></div><div class="sk sk-line" style="width:85%"></div></div></div>
  </div>
</div>

<script>window.API_BASE = window.API_BASE || "https://arsan-api.a-king-6e1.workers.dev";</script>
<script src="brand.js?v=21"></script>
<script src="auth-gate.js?v=20"></script>
<script>
(function(){
  'use strict';
  const API = window.API_BASE;
  function token(){ return localStorage.getItem('arsan_token') || localStorage.getItem('arsan_token_v1') || ''; }
  function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  async function api(path){
    const r = await fetch(API + path, {
      headers: { 'Content-Type':'application/json', ...(token() ? {'Authorization':'Bearer '+token()} : {}) }
    });
    return r.json();
  }

  let allPeople = [];
  let activeDept = '';
  let searchQuery = '';

  function avatarLetter(p){
    if (p.firstName) return p.firstName.charAt(0).toUpperCase();
    return (p.email||'?').charAt(0).toUpperCase();
  }
  function fullName(p){
    return [p.firstName, p.lastName].filter(Boolean).join(' ').trim();
  }
  function roleArabic(r){ return r==='admin'?'أدمن':r==='editor'?'محرّر':r==='viewer'?'مشاهد':'ضيف'; }

  function renderChips(){
    const depts = [...new Set(allPeople.map(p => p.department).filter(Boolean))].sort();
    const wrap = document.getElementById('deptChips');
    let html = `<button class="chip ${!activeDept?'active':''}" data-dept="">الكل (${allPeople.length})</button>`;
    for (const d of depts){
      const n = allPeople.filter(p => p.department === d).length;
      html += `<button class="chip ${activeDept===d?'active':''}" data-dept="${escapeHtml(d)}">${escapeHtml(d)} (${n})</button>`;
    }
    wrap.innerHTML = html;
    wrap.querySelectorAll('.chip').forEach(c => {
      c.onclick = () => { activeDept = c.dataset.dept; renderChips(); renderGrid(); };
    });
  }

  function renderGrid(){
    let list = allPeople.slice();
    if (activeDept) list = list.filter(p => p.department === activeDept);
    if (searchQuery){
      const q = searchQuery.toLowerCase();
      list = list.filter(p => {
        return (fullName(p).toLowerCase().includes(q)
          || (p.email||'').toLowerCase().includes(q)
          || (p.jobTitle||'').toLowerCase().includes(q)
          || (p.department||'').toLowerCase().includes(q));
      });
    }
    list.sort((a,b) => fullName(a).localeCompare(fullName(b), 'ar') || a.email.localeCompare(b.email));
    document.getElementById('count').textContent = list.length + ' / ' + allPeople.length;

    const g = document.getElementById('grid');
    if (!list.length){
      g.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <div>لا توجد نتائج مطابقة</div>
      </div>`;
      return;
    }
    g.innerHTML = list.map(p => {
      const name = fullName(p);
      const av = (p.avatar && p.avatar.startsWith('data:'))
        ? `<img src="${escapeHtml(p.avatar)}" alt="">`
        : escapeHtml(avatarLetter(p));
      const tags = [];
      if (p.department) tags.push(`<span class="p-tag">${escapeHtml(p.department)}</span>`);
      if (p.role && p.role !== 'viewer' && p.role !== 'guest') tags.push(`<span class="p-tag role-${p.role}">${roleArabic(p.role)}</span>`);
      return `<a class="person" href="profile.html?email=${encodeURIComponent(p.email)}">
        <div class="p-avatar">${av}</div>
        <div class="p-info">
          <div class="p-name">${name ? escapeHtml(name) : '<span class="placeholder">— بلا اسم —</span>'}</div>
          <div class="p-job">${escapeHtml(p.jobTitle || '—')}</div>
          <div class="p-email">${escapeHtml(p.email)}</div>
          ${tags.length ? `<div class="p-row">${tags.join('')}</div>` : ''}
        </div>
      </a>`;
    }).join('');
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    renderGrid();
  });

  async function init(){
    if (!token()){ setTimeout(init, 500); return; }
    const data = await api('/api/people');
    if (!Array.isArray(data)){
      document.getElementById('grid').innerHTML = `<div class="empty" style="grid-column:1/-1">تعذّر تحميل الفريق: ${escapeHtml(data?.error||'خطأ غير معروف')}</div>`;
      return;
    }
    allPeople = data;
    renderChips();
    renderGrid();
  }
  init();
})();
</script>
</body>
</html>
